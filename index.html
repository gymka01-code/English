208. obfuscation – запутывание [программного кода], проф. обфускация # (от лат. obfuscare – затенять, затемнять; и брит. obfuscate – делать неочевидным, запутанным, сбивать с толку) в ИБ – приведение исходного текста или исполнимого кода программы (при его генерации) к виду, сохраняющему её функциональность, но затрудняющему анализ, понимание алгоритмов работы и возможность модификации с использованием декомпиляции; иногда делается для уменьшения объёма кода. Такая технология реализуется, в частности, в крипторах (crypter). Синонимы – metamorphing, mutation (см. также executable code, obfuscator, security).
209. off-line attack (также offline attack) – офлайновая атака, офлайн-атака # атака, в которой злоумышленник вначале добывает необходимые ему данные (обычно путём перехвата сообщений протокола аутентификации или путём проникновения в систему и кражи секретных файлов), после чего анализирует их при помощи системы по собственному выбору (см. также attack, off-line, online attack).
210. online attack (также on-line attack) – онлайновая атака, онлайн-атака # атака компьютерную систему, корпоративную сеть, веб-сайт и др., проводимая через Интернет, например атака на протокол аутентификации с целью получить как бы легальный доступ к системе или узнать секретные данные для аутентификации. Пример: It is often difficult to locate the source of an online attack. – Источник (инициатора) онлайновой атаки зачастую очень трудно локализовать (установить) (см. также attack, off-line attack, verifier impersonation attack).
211. operational vulnerability information – оперативная информация по уязвимости # в ИБ – информация, описывающая присутствие уязвимости в конкретной операционной среде или сети (см. также vulnerability).
212. outside threat (также outsider threat) – внешняя угроза # в ИБ – угроза от неавторизованного субъекта или объекта, находящегося за пределами (границами) домена безопасности и имеющего потенциальные возможности нанести вред корпоративной системе путём разрушения, раскрытия и/или модификации данных и/или вывода системы из строя. Синонимы – external threat, outer threat (см. также inside threat).
213. passive attack – пассивная атака, пассивное нападение # в компьютерной безопасности – нападение на систему или на сеть, которое трудно обнаружить, когда, например, злоумышленник подключается к каналам передачи данных и прослушивает сеть, чтобы определять характеристики передаваемых данных, читать и анализировать сообщения, не изменяя их и не меняя режимы работы. Синоним – passive assault (см. также attack, eavesdropping, sniffing).
214. passive hiding – пассивное сокрытие [информации] # в ИБ – способ технической защиты информации путём ослабления энергетических характеристик физических сигналов, полей или уменьшения концентрации веществ (см. также active hiding, security activity).
215. password (PSWD, PW) – пароль # код (секретная уникальная последовательность символов – букв, цифр и/или специальных знаков), необходимый пользователю для аутентификации, проверки идентичности и для получения доступа к закрытой (защищённой) системе, системным ресурсам или сервису. Например, encrypted blockchain password – зашифрованный пароль доступа к блокчейну. Синонимы – code word, countersign, parole, watchword (см. также access code, authentication password, BIOS password, blockchain password, boot-up password, brute-force attack, character-based password, cleartext password, insecure password, login, logon password, network password, one-time password, passcode, passphrase, password aging, password attack, password cracker, password equivalence, password fishing, password generator, password guessing, password management, password protection, password verification, picture password, PIN, plain-text password, salt, weak password).
216. password cracking – взлом паролей # процесс получения (восстановления, распознавания, угадывания, определения, похищения) секретных паролей, хранящихся в компьютерной системе или передаваемых по сети (см. также password cracker).
217. password protection – 1. защита паролём, проф. защита паролём, защита с помощью (с использованием) паролей, парольная защита # в ИБ – использование паролей в качестве средства, позволяющего получить доступ к компьютерной системе, системным ресурсам и данным только авторизованным пользователей. Пример: Password protection against illegal copying is not effective. – Защита паролём неэффективна против (от) нелегального копирования [ПО]. Частичный синоним – password protected (см. также password, protection, security);
2. защита паролей # в различных системах ИБ значение термина может существенно варьироваться – от шифрования паролей до их периодической замены. Синоним – password security (см. также password aging).
218. penetration testing (также pentest, pentesting, penetration test, pen testing) – испытание проникновением, проф. пентест # в ИБ – поиск уязвимостей и оценки безопасности компьютерной системы, веб-приложения, сети или хоста с помощью взлома, проводимый с разрешения владельца. Во время такого тестирования тестировщик, используя всю имеющуюся документацию (по архитектуре и реализации системы, по исходным текстам, по эксплуатации), устраивает псевдоатаку на корпоративную систему или компьютерную сеть, инсценируя (имитируя) действия реальных злоумышленников, или атаку, проводимую каким-либо вредоносным ПО без непосредственного участия самого взломщика. Испытания проникновением существенно различаются по способу их организации. Существуют стандартизированные методологии проведения пентестов (GWAPT, IEM, OWASP). Итогом испытаний является письменный отчёт с перечислением обнаруженных уязвимостей, уровня риска, связанного с каждой из них, и рекомендациями по снижению рисков. Такое тестирование должно проводиться периодически, поскольку изменения конфигурации сети, установка новых приложений и т. п. могут вызвать появление новых уязвимостей. Синонимы – ethical hacking, white-hat hacking; частичный синоним – intrusion testing (см. также exploit, penetration tester, pentesting toolkit, security, targeted testing, testing, vulnerability level).
219. perimeter defense – защита периметра [безопасности системы, сети, организации]; защита по периметру # по аналогии с круговой обороной в военном деле – осуществляется с помощью сетевых экранов, антивирусных сканеров, систем обнаружения атак и др. (см. также air gap, firewall, IDS, logical perimeter, security perimeter, security solution, virus scanner).
220. potential impact – потенциальный ущерб, потенциальный вред # в ИБ – потеря (нарушение) конфиденциальности, целостности или готовности (доступности) компьютерных систем, в результате чего можно ожидать ограниченных (низких, малых), серьёзных (умеренных, средних) или катастрофических (высоких, сильных) вредных последствий для бизнеса организации, её активов или для людей (см. также availability, confidentiality, high impact, impact analysis, impact value, integrity, low impact, moderate impact, security).
221. quarantine – 1. карантин; карантинизация; изоляция # исходно медицинский термин, означающий размещение заражённых (больных) людей или зверей отдельно от здоровых, чтобы минимизировать опасность эпидемии, широкого распространения инфекционного заболевания; в ИБ – изолирование подозрительных файлов, предположительно содержащих мэлвер, вредоносные программы, для будущего исследования или “дезинфекции”, обеззараживания. Находящиеся в карантине файлы не будут исполняться, однако пользователь может восстановить их, если окажется, что подозрения были неоправданными (см. также disinfection, infection, malware, sandbox, security);
2. изолировать.
222. red team – “красная команда”, независимая группа специалистов-аудиторов (аналитиков) # в США такие группы привлекаются (часто секретно) для анализа деятельности гражданских и военных организаций с целью повышения их эффективности, исследования и прогнозирования возможных сценариев развития событий в мировой экономике и военных конфликтах. Аналогичные группы высококвалифицированных специалистов по информационной безопасности (ИБ) проводят тестирование систем (сетей, приложений) для выявления уязвимостей и др. (см. также ethical hacking, intelligence community, red teaming, security, vulnerability scan).
223. remediation plan – план устранения уязвимостей или угроз # в ИБ – план по устранению одной или нескольких угроз или уязвимостей, обнаруженных при аудите безопасности (защищённости) корпоративных систем организации; в этом плане обычно указываются возможные способы устранения угроз или уязвимостей и приоритетность выполнения работ (см. также remediation, threat, vulnerability).
224. replay attack – атака путём повтора (с использованием) перехваченных данных # в ИБ – ситуация, когда атакующий перехватывает передаваемую по каналам связи информацию аутентификации или информацию управления доступом, затем ретранслирует её с целью получения несанкционированного доступа (НСД) к системе. Пример: Some cryptographic protocols are vulnerable to replay attacks. – Некоторые криптографические протоколы уязвимы к атакам путём повтора перехваченных данных (см. также attack, nonce, unauthorized access).
225. replay attack detection (также replay detection) – обнаружение атаки, проводимой путём повтора (с использованием) перехваченных данных # в ИБ, в стандарте IPSec, в протоколах TKIP и CCMP (см. также replay attack).
226. rule-based security policy – политика безопасности на основе правил # в ИБ – политика безопасности, предусматривающая для всех субъектов установление глобальных правил, согласно которым обычно производится сравнение чувствительности (важности, секретности, уязвимости, sensitivity) объектов доступа и соответствующих атрибутов (прав, привилегий) субъектов, запрашивающих доступ к этим объектам. Частичный синоним – discretionary access control (см. также access control, security policy).
227. rules of engagement (ROE) – правила совместной работы # в ИБ – детальные руководящие указания и ограничения, касающиеся проведения тестирования средств безопасности корпоративной информационной системы (КИС). Эти правила утверждаются до начала тестирования и предоставляют команде специалистов-тестировщиков права выполнять все оговорённые действия без дополнительных разрешений (см. также rule, security testing).
228. secret – 1. (также secrecy) – секрет, тайна # сведения, данные, информация, документы, критически важные для страны, организации, человека, не подлежащие разглашению, широкому распространению, охраняемые и защищаемые различными государственными законами, корпоративными положениями и др. Соответственно различают государственную, служебную, коммерческую, технологическую, врачебную тайну, персональные данные (ПД), конфиденциальные сведения разной степени секретности и др. (см. также classified secret, manufacturing secret, private data, state secret, technological secret, trade secret);
2. секретно (С) # гриф (форма допуска к секретным материалам и/или к секретной работе) (см. также classification, confidential, security clearance, top secret);
3. секретный, тайный # см. также secret communication, secret key, secret seed.
229. secure web gateway (SWG) – защищённый веб-шлюз # программная система, обеспечивающая защиту от внешних веб-угроз (web threat) – вредоносного и шпионящего ПО, нежелательного веб-контента, фишинга и т. п. (см. также attack, exploit, malware, threat, vulnerability).
230. secure web service – защищённый веб-сервис # см. также Web service.
231. secure wireless network – защищённая беспроводная сеть # беспроводная сеть, оснащённая средствами защиты (например, криптографической) передаваемых данных (см. также wireless network).
232. securing – обеспечение безопасности, организация защиты # например, securing computer-based resources – обеспечение безопасности компьютерных ресурсов (см. также resecuring, security).
233. security – 1. защита; защищённость, безопасность # общий термин, охватывающий методы, средства и технологии физической, информационной и иных видов защиты от атак, угроз и рисков для объектов, систем, сетей, предприятий, пользователей и др.; в частности, свойства ПО и аппаратного обеспечения, обеспечивающие предотвращение несанкционированного доступа (случайного или намеренного) к программам и данным (см. также A1 security, access control, attack, authorization, communication security, computer security, content security software, crimeware, cryptographic security, data security, emission security, information security, Internet security, login security, network security, physical security, proactive security, security administrator, security agent security architecture, security audit, security breach, security certification, security context, security design, security engineering, security erase, security evaluation, security hole, security kernel, security log, security management, security model, security patch, security perimeter, security policy, security protocol, security scanner, security service, security solution, security technology, security testing, security textbook, security threat, security tools, security vulnerability, traffic-flow security, transmission security, Web security);
2. служба безопасности # см. также security audit, security certification, security management, security policy, wireless security;
3. секретность, конфиденциальность, защищённость # пример: “Neither the first Ethernet local area network nor the first Internet computer networks were built with privacy or security in mind” (T. Shimomura). – При разработке как первой локальной сети Ethernet, так и первых компьютерных сетей Интернета о проблемах защищённости персональных данных и безопасности практически не думали.
234. security activity – активность защиты [информации] # в ИБ – принцип защиты, предусматривающий целенаправленное навязывание противнику (например, техническим разведкам противника) ложного представления об объекте защиты в соответствии с замыслом (стратегией) защиты, а также противодействие средствам технической разведки. Упреждающее предотвращение (нейтрализация) угроз ИБ (см. также security, security threat).
235. security administrator (security admin, secadmin) – администратор [системы] безопасности # специалист, обслуживающий средства защиты корпоративной сети; готовит и устанавливает политики ИБ; проводит оценку защищённости корпоративный ИТ-ресурсов, а также занимается устранением угроз ИБ. Пример: Root and administrative level passwords are the keys to the kingdom for an intruder. – Пароли корневого и административного уровня открывают злоумышленнику доступ к систему (сети) (см. также CSO, DSO[2], network security, system administrator).
236. security advice – рекомендации по обеспечению безопасности, рекомендации по ИБ # см. также cybersecurity, safety, security.
237. security analysis – анализ надёжности (защищённости, безопасности) # в частности, анализ решения по ИБ. Пример: A complex system can also mean an increased difficulty for security analysis and secure implementation, a poorer performance, and a higher overhead cost for running and maintenance. – Сложность системы может также означать повышенную трудность анализа её надёжности и реализации требований безопасности, меньшую производительность и увеличенные накладные расходы при эксплуатации и техническом обслуживании (см. также security).
238. security analyst – аналитик в области безопасности # см. также information security analyst, security analytics.
239. security analytics – аналитика безопасности # обеспечивается специализированным ПО. Например, security analytics platform – платформа для аналитики безопасности (см. также big data security analytics, information security, security analyst).
240. security architecture – архитектура системы безопасности # например, security architecture solutions – решения в области архитектуры систем безопасности (см. также security, X.800).
241. security assessment – оценка (оценивание) качества обеспечения безопасности # пример: A security assessment can provide necessary information on how business processes use network technology. – Оценка качества обеспечения безопасности позволяет получить информацию, необходимую для определения эффективности использования сетевой технологии бизнес-процессами (см. также security, security assessment report).
242. security assessment report (SAR) – отчёт по оценке средств обеспечения безопасности # (ранее – certification package, пакет документов по сертификации) в ИБ и технологиях управления рисками – документирование детальных результатов тестирования, сертификации, аудита ИТ-систем по требованиям физической и/или информационной безопасности (см. также safety, security, security assessment).
243. security association – согласование мер безопасности, связь для обеспечения безопасности # в ИБ – отношения, устанавливаемые между двумя или более объектами (лицами, пользователями, организациями) с целью обеспечения защиты данных, которыми они обмениваются (см. также security).
244. security audit – проверка (контроль, аудит) [средств] защиты контроль средств безопасности # в ИБ – проверка функционирования систем защиты и работы персонала на соответствие требованиям безопасности с предупреждением сетевого администратора о выявленных нарушениях защиты. В более узком смысле – это выявление в результате бесед с руководителями предприятия (компании) и инструментальных проверок нарушений политик безопасности, надёжности организации защиты систем, организации регистрации, хранения и анализа данных, затрагивающих безопасность объекта оценки, реагирования на возможное нарушение безопасности, а также подготовленности персонала и физической безопасности и др. Пример: Firewalls and intrusion detection systems mean nothing if your passwords are compromised. – Брандмауэры (межсетевые экраны, МЭ) и системы обнаружения вторжений оказываются бесполезными, если вы не можете обеспечить секретность своих паролей (см. также audit guide, network security, security administrator, security breach, security consulting).
245. security awareness – осведомлённость [персонала] о правилах [информационной] безопасности # см. также security.
246. security banner – баннер секретности # размещаемый в верхней или нижней части компьютерного экрана баннер с общими указаниями, касающимися секретности системы. Этот термин обозначает также начальную заставку системы с информацией для пользователей относительно правил ИБ, которые необходимо соблюдать при доступе к компьютерным ресурсам (см. также banner, safeguarding statement, security).
247. security best practices – лучшие практические методы по обеспечению безопасности, ИБ # см. также best practice, cybersecurity, safety, security.
248. security breach – нарушение защиты, взлом системы; брешь (нарушение) в системе безопасности # пример: Security breaches can cause malfunctions ranging from annoying to life-threatening. – Нарушения (бреши) в системе безопасности могут приводить к самым разным нежелательным последствиям, от раздражающих сообщений до угроз (риска) для жизни. Частичный синоним – computer breach (см. также attack, breach, cracker, loophole, security audit, security penetration, vulnerability).
249. security bug – ошибка, опасная для (с точки зрения) [компьютерной, информационной] безопасности. Синоним – security error.
250. security cable – трос (тросик) безопасности # средство защиты от воровства для мобильных и иных небольших, но дорогостоящих устройств, например мониторов, ноутбуков, компьютеров Mac Pro и др. – используется для прикрепления подобных устройств к стене, столу или другой тяжёлой или неподвижной конструкции при помощи специальных замков (см. также kensington lock).
251. security camera – камера видеонаблюдения # видеокамера, предназначенная для записи событий на объекте наблюдения c целью предупреждения преступлений и помощи в их раскрытии. Например, wireless security camera – беспроводная камера видеонаблюдения; Wi-Fi-connected security camera – камера видеонаблюдения с интерфейсом Wi-Fi (см. также security, video camera, video surveillance).
252. security categorization – категоризация (классификация) по секретности # в ИБ – процесс определения (установления) конкретной категории секретности и необходимой защищённости (и присвоения грифа секретности) для информации или информационной системы (ИС) по методологиям, регламентируемым специальными документами (см. также category, security category, security classification).
253. security category – категория секретности; степень, уровень секретности # в ИБ – уровень секретности и соответствующей защищённости, присваиваемый документу, файлу, записи или информационной системе (ИС) в зависимости от важности и ценности содержащейся в них информации, на основе оценки потенциального вреда, который потеря (нарушение) конфиденциальности, целостности или готовности подобной информации или ИС может нанести организации, её активам и операционной деятельности, или индивидуальным пользователям (см. также availability, confidentiality, impact, integrity, security categorization, security level).
254. sensitivity – 1. чувствительность, уязвимость, секретность # в ИБ – характеристика ресурса, системы или данных, показывающая их значимость или важность и, соответственно, необходимость защиты (представляется соответствующей меткой, security label) (см. также data classification);
2. способность быстро реагировать.
255. SIEM – security information and event management – управление информацией безопасности и событиями безопасности, технология SIEM # общее обозначение категории программных продуктов и сервисов, реализующих управление информацией безопасности (security information management, SIM) и управление событиями (инцидентами) безопасности (security event management, SEM) – поэтому аббревиатуры SEM, SIM и SIEM иногда употребляются как синонимы (взаимозаменяемые). При этом SEM обычно представляет мониторинг событий безопасности в реальном времени, выявление их взаимосвязей и оповещение ответственных лиц, а SIM обеспечивает журналирование и долговременное хранение собираемых данных по безопасности, их анализ и составление соответствующих отчётов. Расширение функциональности и развитие сетевых технологий обусловливают и изменение требований по безопасности – например, для обеспечения безопасности речевых данных появилась технология vSIEM (voice security information and event management). В общем, технологии и системы SIEM служат основой центров обеспечения безопасности (ЦОБ), центров оперативного реагирования на инциденты ИБ, они призваны предоставлять руководителям и сотрудникам служб безопасности ту информацию, которая будет способствовать обнаружению уязвимостей, угроз и предотвращению инцидентов ИБ. В то же время наряду с SIEM появляются новые, более совершенные технологии мониторинга событий, связанных с информационной безопасностью (ИБ), контроля и анализа поведения не только пользователей, но и разных сущностей, процессов, трафиков, объектов, приложений – с целью выявления и прогнозирования ИБ-рисков (см. также big data security analytics, incident response, information security, security, security operations center, UBA, UEBA).
256. signature analysis – сигнатурный анализ, анализ сигнатур # базируется на совпадении фрагмента кода или последовательности сигналов с эталонным образцом; используется, в частности, для контроля работоспособности аппаратуры компьютера или для защиты от известных вирусов, от атак (вторжений) и др. (см. также heuristic analysis, intrusion prevention system, network security, signature, signature-based scanning, signature-based tools, signature engine, virus signature).
257. signature-based scanning – сканирование (проверка) [компьютера] на наличие вирусов с известными сигнатурами # один из способов обеспечения информационной безопасности – позволяет обнаружить и нейтрализовать (удалить) известные вирусы (см. также signature analysis).
258. social engineering – “социальная инженерия”, социотехника # методы и тактика злонамеренного проникновения, при которой злоумышленник путём “уговоров” обманывает пользователей или администратора (например, представляясь новым сотрудником), входит таким образом в доверие и добивается значимой информации о компании и/или её компьютерных системах, чтобы получить несанкционированный доступ к сети. Обычно злоумышленники учитывают особенности человеческой природы, играют на жадности, тщеславии жертвы – или на желании оказать помощь ближнему. Пример: “For me it wasn’t difficult becoming proficient in social engineering” (Kevin D. Mitnik). – Мне было несложно стать знатоком социальной инженерии (см. также cracker, dumpster diving, human factor, human-factors engineering, impostor, information security, low-tech attack, phishing, wetware).
259. spillage – 1. (также data spillage) – утечка [данных, информации] # в ИБ – инцидент, в результате которого секретная или контролируемая несекретная информация передаётся в компьютерную систему, не авторизованную (не аккредитованную) для работы с материалами такого уровня секретности, для их хранения и/или обработки. Частичный синоним – leakage (см. также classified information spillage, CUI, incident, security);
2. потери от утечки [данных, информации].
260. spyware – spy software – шпионящее ПО, разг. шпионское ПО # ПО, разновидность мэлвера (malware); предназначается для незаметной установки на компьютере в приложении с целью сбора информации о пользователях или организациях без их ведома, например путём слежения за действиями пользователя. Перехватывает его почтовую переписку, вводимую им информацию, пароли и команды и сообщает о них заинтересованном лицу (или организации). Такое ПО – большая угроза для государства, бизнеса и неприкосновенности частной жизни. В общем случае шпионящим ПО можно считать любое ПО, которое тайно использует подключение к Интернету для связи с внешним сервером и перехвата данных. Отметим, что различают также вредоносные и не вредоносные виды шпионящего ПО (malware forms of spyware, non-malware forms of spyware). Синоним – scumware (см. также anti-spyware, keystroke logger, security, spyware blocker).
261. supply chain attack – атака на логистическую цепочку # в ИБ – атака, позволяющая противнику-злоумышленнику использовать импланты или другие уязвимости, заложенные в систему до её установки, чтобы получать несанкционированный доступ (НСД) к данным и манипулировать продуктами и/или сервисами информационных технологий (аппаратными и программными средствами, ОС, периферийными устройствами) в любой момент в течение их жизненного цикла (см. также attack, implant, supply chain, vulnerability).
262. tampering – 1. злонамеренное несанкционированное вмешательство в работу аппаратных или программных средств [компьютера]; взлом системы # внесение изменений в систему, в компоненты системы, их поведение или в данные. Например, data tampering – незаконное умышленное изменение, искажение или хищение данных; фальсификация данных (как хранящихся в БД, так и передаваемых по сетевым соединениям); document tampering – подделка документов (см. также protector, security, STRIDE, tamper);
2. несанкционированное копирование микросхем (см. также anti-tampering techniques, reverse engineering, tamper-proof).
263. tamper-proof – защищённый (с защитой) от злонамеренного (несанкционированного) вмешательства, от взлома, от воровства, от неумелого, небрежного обращения, от внесения неавторизованных изменений # пример: Slightly more formally, we can say that a smart card is a portable, tamper-proof computer with a programmable data store. – Несколько более формально можно сказать, что смарт-карта – это защищённый от злонамеренного вмешательства миниатюрный компьютер с программируемым хранением данных. Синоним – tamper-resistant (см. также anti-tamper, protection against tampering, tamper, tampering, tamper resistance, tamper tolerant software).
264. targeted attack – целевая атака, целенаправленная атака, проф. таргетированная атака # компьютерная атака, направленная на конкретного пользователя, небольшую группу пользователей, компанию, организацию или на целые отрасли промышленности. Основные цели подобных атак – взлом компьютерных систем и кража конфиденциальной информации, разрушение веб-серверов и других важных ресурсов, нарушение производственных или бизнес-процессов организации, деятельности государственного ведомства и т. п. Этот тип атак получает всё большее распространение. Точные цифры убытков от таких атак оценить трудно, но это уже сотни миллиардов долларов (порядка 600 млрд в 2017 г.). Частичный синоним – эффективная целенаправленная атака, комплексная целенаправленная угроза, APT-атака (см. advanced persistent threat, APT) (см. также attack, IoT-targeted attack, targeted attack protection).
265. technical security controls – технические средства [обеспечения] безопасности # в ИБ – средства защиты компьютерной системы (КС), которые реализуются и действуют в самой КС благодаря механизмам, содержащимся в её аппаратных, программных или аппаратно-программных компонентах (см. также safeguard, security, security controls, technical security).
266. threat – опасность, опасная ситуация, опасное событие, угроза [ИБ] # термин используется для обозначения как действий злоумышленников, так и рисков – потенциально возможных, злонамеренных или иных действий, которые могут нарушить информационную безопасность, нанести вред, например опасность преодоления защиты (угроза безопасности) компьютерной системы. Угрозы можно разделить на внутренние (inner threats) и внешние (outer threats). Согласно ISO/IEC 13335 угроза – потенциальная причина нежелательного инцидента. Чаще всего угроза является следствием наличия уязвимостей в защите компьютерных систем (таких, например, как возможность доступа посторонних лиц к критически важному оборудованию или ошибки в ПО). Синонимы – danger, peril, hazard, menace, risk (см. также active threat, advanced persistent threat, blended threat, cyber threat, hacker threat, hacking, inside threat, internal threat, intruder, IT security threat, modem threat, network threat, outside threat, physical threat, potential threat, security threat, threat analysis, threat control, threat detection, threat event, threat landscape, threat modeling, threat monitoring, threat prevention, threat response, threat scenario, threat shifting, threat space, unstructured threat, web threat).
267. threat actor – агент угрозы, источник угрозы [ИБ]; исполнитель угрозы; злоумышленник; вредоносный актор (агент); атакующий # человек, компьютер или организация, действия которых вызывают события или инциденты, приводящие или могущие привести к компрометации системы защиты и к нарушениям безопасности другой организации. Синоним – malicious actor (см. также actor, security, security threat).
268. threat analysis – анализ угроз [ИБ] # в ИБ – оценка типов, масштабов и природы событий или действий, которые могут привести к неблагоприятным последствиям; оценка степени угроз применительно к конкретным уязвимостям и вероятности их осуществления для конкретной системы в конкретном операционном окружении. Синоним – threat assessment (см. также operating environment, security, threat, threat identification, threat modeling, threat probability).
269. threat assessment – оценка угрозы (угроз) [ИБ] # в ИБ – формальное оценивание степени опасности конкретной угрозы для компьютерной системы (ИС) или организации и описание природы этой угрозы. Синоним – threat analysis (см. также security, threat).
270. threat control – контроль угроз (рисков); защита от угроз (рисков) [ИБ] # например, защита от угроз (рисков) беспроводной связи (wireless threats).
271. threat data – исходные (необработанные, сырые) данные по угрозе (угрозам) [ИБ] # данные, собранные по потенциальным угрозам (киберугрозам) средствами разведки и платформы threat intelligence platform (см. также intelligence, threat information, threat intelligence).
272. threat detection – обнаружение угроз [ИБ] # например, AI threat detection – обнаружение угроз с помощью средств ИИ (см. также behavioral threat detection, TDS, threat, zero-day threat detection).
273. threat event – событие угрозы [ИБ]; опасное, угрожающее событие # в ИБ – событие или ситуация, чреватая нежелательными последствиями, потенциальным вредом для системы и/или организации (см. также security, threat).
274. threat identification – идентификация угрозы [ИБ] # в оценке рисков – процесс идентификации источников угроз (см. также threat analysis, threat source).
275. threat intelligence – 1. сведения об угрозах [ИБ];
2. сбор данных об угрозах [ИБ] # см. также threat analysis, threat source.
276. threat landscape – ландшафт угроз # общая текущая ситуация, общая картина угроз ИБ (см. также security, threat).
277. threat modeling – моделирование угроз [ИБ] # в ИБ – предусматривает обычно компьютерный анализ и имитацию сетевых угроз и атак, вредоносных программ и инструментов, действий злоумышленников, а также уязвимостей системы, возможных схем и способов защиты, необходимых ресурсов и ПО для обеспечения безопасности. Существуют различные методологии моделирования угроз ИБ и ПО, предназначенное для этой цели (см. также security requirements, threat analysis, threat model space).
278. threat model space – пространство модели угроз [ИБ] # предмет и средство исследования алгоритмов машинного обучения (МО) и алгоритмов искусственного интеллекта (ИИ); позволяет анализировать и выбирать направления развития и реализации систем обеспечения безопасности, систем распознавания, систем технического зрения (СТЗ) и др. (см. также threat modeling, threat space).
279. threat monitoring – мониторинг угроз [ИБ] # в ИБ – анализ, оценивание и экспертиза результатов аудита и другой информации, собранной в целях выявления (обнаружения) в информационной системе (ИС) тех событий, которые могут быть связаны с нарушениями безопасности (см. также assessment, security, threat analysis).
280. threat prevention – предотвращение угроз (угрозы) [ИБ] # см. также firewall, threat.
281. threat probability (также probability of threat) – вероятность угрозы, вероятность осуществления угрозы [ИБ] # для оценки допустимо использовать трёхбалльную шкалу (низкая, средняя и высокая вероятность) (см. также threat analysis).
282. threat profile – профиль угрозы [ИБ] # профиль угрозы содержит информацию об угрозе, включающую в себя: название угрозы, её общее описание, источник угрозы (исходя из модели нарушителя), способ реализации, объект защиты (активы, на которые направлена угроза), последствия осуществления угрозы, предпосылки возникновения угрозы (уязвимости) и др. (см. также threat).
283. threat report – отчёт об угрозах [ИБ] # документ, публикуемый агентствами и компаниями, специализирующимися на ИБ. Содержит описание текущей ситуации в области ИБ, новых типов угроз и трендов, а также содержит рекомендации по борьбе с новыми киберугрозами (см. также threat, threat research).
284. threat research – исследование угроз [ИБ] # анализ реальных и потенциальных угроз (и рисков). Например, threat research team – группа по исследованию угроз ИБ (см. также threat, threat report).
285. threat response – реакция на угрозу [ИБ], защита от угроз [ИБ] # пример: Complex, heterogeneous IT environments make data protection and threat response very difficult. – В современных условиях, когда ИТ-системы становятся всё более сложными и разнородными, весьма затрудняется защита данных и защита от угроз ИБ (см. также security).
286. threat scenario – сценарий угроз [ИБ] # в ИБ – частично упорядоченная по времени совокупность отдельных угрожающих событий (threat event), связанных с конкретным источником угроз (threat source) или с несколькими источниками (см. также security, threat).
287. threat sensitive – чувствительный к угрозам, подверженный угрозам # см. также security, threat.
288. threat shifting – изменение угрозы, смещение угрозы [ИБ] # в ИБ – реакция злоумышленника, обнаружившего (натолкнувшегося на) средства защиты системы: он меняет некоторые параметры своей вредоносной атаки, чтобы обойти эти средства защиты (см. также security, security controls, threat).
289. threat source – источник угроз [ИБ] # в ИБ – план-схема и метод, нацеленные на сознательное использование уязвимости системы, или ситуация и метод, которые могут сделать это случайно, непреднамеренно. Синоним – threat agent (см. также intruder, security, threat).
290. threat space – пространство угроз [ИБ] # совокупность всех возможных угроз информационной безопасности (ИБ), включая угрозы [от] окружающей среды, вирусов, Интернета и др. (см. также information security, SWOT, threat model space, threat space search).
291. threat space search (также threat-space search, TSS) – поиск (определение) пространства угроз (уязвимостей), поиск в пространстве угроз [ИБ] # одно из средств обеспечения информационной безопасности (ИБ) и защиты системы от злонамеренных атак, а в некоторых играх, например Го, – способ нахождения оптимальных решений (ходов), ведущих к выигрышу (см. также threat space).
292. threat window – окно опасностей, окно угроз [ИБ] # в ИБ – время с момента появления уязвимости до момента её устранения (это иногда часы, дни или более длительный период) – и обновления базы данных известных угроз, вирусов, атак с соответствующими сигнатурами, которая обычно используется средствами (механизмами) защиты и позволяет снизить вероятность взлома системы, защитить её от нового вида атаки. Если окно опасности открыто, злоумышленник может произвести успешную атаку на систему (см. также attack, signature, security, threat, threat intelligence, virus, vulnerability).
293. trusted computer system – доверенная компьютерная система, безопасная (защищённая) система # в ИБ – система, в которой реализован комплекс мер информационной и физической защиты согласно принятой политике обеспечения безопасности, что позволяет использовать её для одновременной обработки разной чувствительной (конфиденциальной) или секретной информации. Синоним – protected computer system (см. также classified information, computer system, sensitive information, security).
294. trusted path – доверенный тракт, доверенный канал [взаимодействия] # в ИБ – механизм, позволяющий пользователю или оператору (при помощи устройства ввода данных) непосредственно взаимодействовать (при соблюдении требований безопасности) с функциональными блоками защиты компьютерной системы или иного целевого объекта для поддержки принятой политики безопасности этой системы или объекта (см. также information system, path, security, security policy, target of evaluation, trusted).
295. unknown attack – атака неизвестного типа, неизвестная атака # в отличие от уже известных атак (known attack) (см. также attack).
296. untrusted – ненадёжный, непроверенный; не заслуживающий доверия; незащищённый, небезопасный # в ИБ – о процессе, приложении, компьютере, системе и др. Антоним – trusted (см. также reliable, secure, security, untrusted process).
297. untrusted process – непроверенный процесс # в ИБ – потенциально опасный процесс, который не прошёл проверку и оценку на корректность и соответствие требованиям политики безопасности; он может содержать вредоносный код и попытаться обойти механизмы защиты системы (см. также malicious code, security, security policy).
298. user security function – механизм обеспечения ИБ (информационной безопасности) пользователя # реализует такие функции, как аутентификация, авторизация, сохранение конфиденциальности данных, целостности и доступности данных (см. также information security).
299. vaccine – “вакцина” # программа, обеспечивающая защиту против вирусов дополнительной проверкой целостности операционной системы. Синонимы – antivirus software, virus protection software (см. также virus).
300. virus (также computer virus) – [компьютерный] вирус # тип вредоносных программ, характеризующихся способностью скрытого от пользователя саморазмножения для поражения других программ, компьютеров или сетей. Под саморазмножением понимается способность вируса создавать собственную копию и внедрять её в тело заражаемого исполнимого файла, в документ, содержащий макрокоманды, в загрузочный сектор диска, почтовые сообщения и т. п. Таким образом, вирусы могут попадать в компьютер по электронной почте, через скачанные из Интернета программы, через заражённые съёмные носители и другими способами. Существует множество видов таких программ. Вирусы классифицируются по “среде обитания”, способу заражения среды обитания, воздействию на компьютерную систему и особенностям алгоритма. По среде обитания вирусы делятся на загрузочные (boot virus), резидентные, файловые, дисковые, флэш-вирусы и сетевые. Термин предложил Фред Коэн (F. Кohen) в 1983 г., ещё когда он был студентом Университета Южной Калифорнии. Для борьбы с вирусами применяют антивирусные программы (antivirus software) (см. также antivirus, antivirus virus, bacteria, cell-phone virus, content virus, cryptovirus, dropper, email virus, encrypted virus, file infector, ill-behaved software, infection, information warfare, logic bomb, macro virus, phage, polymorphic virus, slow infector, stealth virus, Trojan, vaccine, virus hoax, virus scanner, worm, Zoo virus).
301. virus attack – вирусная атака # см. также virus.
302. virus code – [машинный] код вируса # чтобы затруднить разбор текстов вирусных программ, в них часто применяют самомодификацию и шифрование кода (см. также self-encrypting virus, self-modifying code, virus).
303. virus filtering – фильтрация вирусов, проверка на вирусы # контроль входящей и исходящей электронной почты, контента служб мгновенного обмена сообщениями (instant messaging) и/или загружаемых файлов на наличие компьютерных вирусов (см. также virus protection, virus scanner).
304. virus hoax (также computer virus hoax, hoax) – вирусный мистификатор # почтовое сообщение, которое не является вирусом, но указывает на якобы распространяющийся новый вирус и даёт рекомендацию, как его удалить с диска. Получателю рекомендуется разослать это письмо всем знакомым. Вирусный мистификатор может оказаться достаточно вредным, если указывает на важный системный файл (см. также virus).
305. virus infection – вирусная инфекция # заражение (инфицирование) компьютера вирусом (см. также infection, virus).
306. virus pattern – шаблон вируса # см. также virus signature.
307. virus protection – защита от вирусов, антивирусная защита # осуществляется с помощью антивирусного ПО (антивируса, virus-protection software) или аппаратно-программно с помощью специальной платы, устанавливаемой в ПК. Синоним – antivirus protection (см. также antivirus, virus, virus filtering, virus infection, virus scanner).
308. virus-protection software – антивирусное ПО # синоним – antivirus software.
309. virus reporting – оповещение о вирусе # например, real-time virus reporting – оповещение о вирусе, производимое в реальном времени (см. также virus).
310. virus scanner (также anti-virus scanner) – программа поиска вирусов, антивирусный сканер # вид антивирусного ПО, например, Dr. Web (компании “Доктор Веб”), Norton AntiVirus (Symantec), или AVP (“Лаборатория Касперского”). Выполняет просмотр ОЗУ, загрузочных секторов дисков, файлов и содержимого почтовых ящиков на наличие сигнатур известных вирусов. Недостаток сканеров – неспособность обнаруживать неизвестные (новые) вирусы (см. также antivirus software, virus, virus reporting, virusscanning schedule).
311. virus scanning schedule – регламент антивирусного сканирования # определяет периодичность и время запуска на исполнение программ поиска вирусов на корпоративных компьютерах (см. также virus scanner).
312. virus signature – сигнатура вируса # отличительный признак, обнаруженный у конкретного экземпляра вируса, например участок кода или контрольная сумма; служит для идентификации этого вируса. Для облегчения работы антивирусного ПО, сигнатуры вирусов хранятся в специальных постоянно обновляемых БД (см. также antivirus software, polymorphic virus, signature, virus).
313. virusware (также virware) – вирусное ПО # программы, распространяющие и/или загружающие (закачивающие) компьютер вирусы и другие инфекции (см. также virus).
314. vulnerability (также security vulnerability) – уязвимость, слабость, слабое место, слабое звено; брешь (дыра) системы защиты (безопасности) # в ИБ и защите данных (ЗД) – свойство системы, позволяющее реализовать соответствующую угрозу; это дефекты безопасности, всё, что может привести к намеренному или случайному нарушению политики безопасности (security policy), нарушению работы и/или взлому системы; например, system vulnerabilities – уязвимости системы. В частности, это недостатки и ошибки ПО или аппаратуры (security error), которыми может в своих целях воспользоваться злоумышленник. Пример: “I have used both technical and nontechnical means to obtain the source code to various operating systems and telecommunications devices to study their vulnerabilities and their inner working” (Kevin D. Mitnik). – Я использовал как технические, так и другие средства, чтобы получить исходные тексты различных ОС и ПО телекоммуникационных систем для изучения их внутреннего устройства и поиска слабых мест. Синонимы – security breach, security flaw, security loophole; частичный синоним – exposure, антоним – invulnerability (см. также API bug, attack, ethical worm, loophole, security, threat window, vulnerability analysis, vulnerability assessment, vulnerability blocking, vulnerability detection, vulnerability disclosure, vulnerability due to interconnectivity, vulnerability intelligence, vulnerability management, vulnerability scanner, vulnerability surface, window of vulnerability).
315. vulnerability analysis – анализ уязвимостей # процесс идентификации и классификации уязвимостей компьютерной системы (см. также vulnerability, vulnerability assessment).
316. vulnerability assessment – оценка уязвимостей # систематическое обследование программной и/или аппаратной системы для определения адекватности действующих средств обеспечения её безопасности, выявления недочётов в защите, сбора данных для прогнозирования эффективности планируемых дополнительных мер безопасности и подтверждения действенности этих мер после их реализации (см. также security, vulnerability, vulnerability analysis).
317. vulnerability blocking – блокирование уязвимостей # один из механизмов в системах защиты от вредоносного ПО (см. также anti-malware, vulnerability).
318. vulnerability detection – обнаружение уязвимостей, выявление уязвимостей # синоним – vulnerability disclosure (см. также code analysis, vulnerability).
319. vulnerability disclosure – выявление уязвимостей, раскрытие уязвимостей # см. также disclosure, hacker-powered security, vulnerability detection.
320. war dialing attack (также war-dialing attack, war-dialing, war-dial) – атака через телефонную линию (через модем) # обнаружение неавторизованных модемов (unauthorized modem) путём последовательного прозвона всех номеров телефонов корпорации с целью проникновения в корпоративную сеть; часто сочетается с проверкой на наличие в сети уязвимостей. Синоним – dial-in penetration attack (см. также CPT, dial-in attack, ethical hacking, penetration testing, security, war dialer).
321. Web attack – атака через Web, веб-атака # см. также attack.
322. Web security (также web security) – 1. веб-безопасность; Интернет-безопасность # например, web application security – безопасность веб-приложений. Синонимы – Internet security, online security (см. также security);
2. защита от Интернет-угроз # защита от веб-угроз (web threat), проникающих в корпоративную или домашнюю сеть через Интернет-шлюзы (см. также attack, exploit, malware, secure web gateway, security, threat, semantic attack, vulnerability, Web security solution).
323. whaling (также whale phishing) – мошенничество с крупными целевыми фигурантами (жертвами, объектами) # разновидность мошенничества или фишинга, направленная на пользователей высокого социального уровня – это обычно крупные бизнесмены, политики, различные знаменитости. Для выуживания персональной и/или коммерческой (финансовой) информации злоумышленники применяют, как правило, методы социальной инженерии (см. также social engineering, fraud, phishing);
324. white-box attack – атака уровня белого ящика # в ИБ – атака, предпосылкой для которой является возможность атакующего-злоумышленника проанализировать программный код приложения, получать доступ к соответствующим адресам памяти во время исполнения программы, вмешиваться в ход программы, перехватывать системные вызовы, использовать для атаки самые разные инструменты (отладчики, эмуляторы и др.). Защиту от атак подобного рода призвана обеспечивать криптография белого ящика (white-box cryptography) (см. также attack, cryptography, system call, white box).
325. white hat hacker – этический (белый) хакер # специалист-консультант, помогающий выявлять и устранять уязвимости сетей и систем, обеспечивать ИБ (см. также ethical hacking).
326. zero-day protection – защита от новейших эксплойтов (уязвимостей ПО) # например, zero-day protection scheme – схема защиты от новейших уязвимостей ПО. Для электронной почты – это фиксация резкого увеличения числа входящих писем (incoming emails), обнаружение новых видов спама (см. также zero-day threat detection).
327. zero-day threat detection – обнаружение сегодняшней (сиюдневной, новейшей) угрозы [ПО] # см. также attack, exploit, threat detection, zero-day protection, zero-day vulnerability.
328. zero-day vulnerability (также zero-day) – сегодняшняя (новейшая) уязвимость [ПО] # только что обнаруженная уязвимость ПО, о которой ещё не известно производителю или для устранения которой ещё нет заплатки. В интересах компьютерного сообщества и пользователей тот, кто обнаружил уязвимость, должен сообщить об этом разработчику и всему сообществу, чтобы можно было как можно быстрее исправить ошибку и/или обеспечить защиту и уменьшение потерь от её вредоносного использования злоумышленниками (см. также 0-day exploit, patch).
329. zombie computer (также zombie, zombie machine) – зомбированный компьютер, [компьютер-]зомби # подключённый к Интернету компьютер, атакованный (захваченный) хакером, заражённый вирусом или троянцем. Как правило, это один из компьютеров целой зомбированной сети (botnet), которая обычно используется для неблаговидных целей. При этом большинство владельцев таких компьютеров могут даже не знать, что их системы выполняют вредоносные задачи под дистанционным управлением злоумышленников – рассылают спам (согласно оценочным данным, 80% всего спама в мире посылают зомбированные компьютеры), атакуют веб-сайты, участвуют в майнинге криптовалюты и т. д. (см. также zombie network).
330. zombie network – зомби-сеть, сеть зомбированных компьютеров (систем) – см. botnet.

    // Умный парсер, который разбивает текст по номерам в начале строки
    let dictionary = [];
    
    function parseText() {
        // Разделяем по регулярке: начало новой строки, за которой идут цифры, точка, пробел и буква
        const rawBlocks = rawText.trim().split(/\n(?=\d+\.\s+[a-zA-Z])/);
        
        rawBlocks.forEach(block => {
            // Убираем номер в самом начале (например, "1. ")
            const cleanBlock = block.replace(/^\d+\.\s*/, '').trim();
            
            if(cleanBlock.length === 0) return;

            // Ищем символ #
            const parts = cleanBlock.split('#');
            const termPart = parts[0].trim();
            const descPart = parts.slice(1).join('#').trim(); // Собираем остаток, если было несколько #
            
            // Аккуратно разделяем Английское и Русское слово
            // Ищем первое вхождение ' – ' (тире с пробелами) или ' - ' (дефис с пробелами)
            let separatorIndex = termPart.indexOf(' – ');
            if (separatorIndex === -1) separatorIndex = termPart.indexOf(' - ');

            if (separatorIndex !== -1) {
                let term = termPart.substring(0, separatorIndex).trim();
                let translation = termPart.substring(separatorIndex + 3).trim();
                
                dictionary.push({
                    term: term,
                    translation: translation,
                    description: descPart || "Описание отсутствует"
                });
            }
        });
        
        // Настройка UI элементов
        document.getElementById('start-idx').max = dictionary.length;
        document.getElementById('end-idx').max = dictionary.length;
        document.getElementById('end-idx').value = Math.min(20, dictionary.length);
        document.getElementById('dict-info').innerText = `Всего терминов в базе: ${dictionary.length}`;
    }

    parseText();

    // Навигация
    function showSection(sectionId) {
        document.getElementById('training-section').classList.add('hidden');
        document.getElementById('dictionary-section').classList.add('hidden');
        document.getElementById(sectionId + '-section').classList.remove('hidden');
        
        if(sectionId === 'dictionary') { renderDictionary(); }
    }

    // ЛОГИКА ТРЕНИРОВКИ
    let currentTrainingQueue = [];
    let currentIndex = 0;

    function startTraining() {
        const start = parseInt(document.getElementById('start-idx').value) - 1;
        const end = parseInt(document.getElementById('end-idx').value) - 1;
        
        if (start < 0 || end >= dictionary.length || start > end) {
            alert(`Ошибка! Введите числа от 1 до ${dictionary.length}. Начальное число не может быть больше конечного.`);
            return;
        }

        currentTrainingQueue = dictionary.slice(start, end + 1);
        currentIndex = 0;
        
        document.getElementById('flashcard-container').classList.remove('hidden');
        displayCard();
    }

    function displayCard() {
        const word = currentTrainingQueue[currentIndex];
        const isReverse = document.getElementById('reverse-mode').checked;
        
        if (isReverse) {
            // Показываем русский, угадываем английский
            document.getElementById('fc-term').innerText = word.translation;
            document.getElementById('fc-translation').innerText = word.term;
        } else {
            // Показываем английский, угадываем русский
            document.getElementById('fc-term').innerText = word.term;
            document.getElementById('fc-translation').innerText = word.translation;
        }
        
        document.getElementById('fc-desc').innerText = word.description;
        
        // Скрываем ответ
        document.getElementById('fc-answer').style.display = 'none';
        document.getElementById('btn-show').classList.remove('hidden');
        document.getElementById('btn-next').classList.add('hidden');
        
        const absoluteIndex = dictionary.indexOf(word) + 1;
        document.getElementById('fc-progress').innerText = 
            `Карточка ${currentIndex + 1} из ${currentTrainingQueue.length} (Слово №${absoluteIndex} из 330)`;
    }

    function showAnswer() {
        document.getElementById('fc-answer').style.display = 'block';
        document.getElementById('btn-show').classList.add('hidden');
        document.getElementById('btn-next').classList.remove('hidden');
        
        if (currentIndex === currentTrainingQueue.length - 1) {
            document.getElementById('btn-next').innerText = "Завершить тренировку";
        } else {
            document.getElementById('btn-next').innerText = "Следующее слово ➔";
        }
    }

    function nextCard() {
        currentIndex++;
        if (currentIndex < currentTrainingQueue.length) {
            displayCard();
        } else {
            document.getElementById('flashcard-container').classList.add('hidden');
            alert('Молодец! Вы прошли выбранный диапазон слов. Выберите новый диапазон для продолжения.');
        }
    }

    // ЛОГИКА СЛОВАРЯ
    function renderDictionary(filterText = "") {
        const listDiv = document.getElementById('dict-list');
        listDiv.innerHTML = '';
        
        const lowerFilter = filterText.toLowerCase();
        
        dictionary.forEach((item, index) => {
            if (item.term.toLowerCase().includes(lowerFilter) || 
                item.translation.toLowerCase().includes(lowerFilter) ||
                item.description.toLowerCase().includes(lowerFilter)) {
                
                const div = document.createElement('div');
                div.className = 'dict-item';
                div.innerHTML = `
                    <div class="dict-index">№ ${index + 1}</div>
                    <div style="font-weight: bold; color: var(--primary); font-size: 18px; margin-bottom: 5px;">${item.term}</div>
                    <div style="font-weight: 600; margin-bottom: 5px;">${item.translation}</div>
                    <div style="color: var(--gray); font-size: 14px;">${item.description}</div>
                `;
                listDiv.appendChild(div);
            }
        });
    }

    function filterDictionary() {
        const text = document.getElementById('search-input').value;
        renderDictionary(text);
    }
</script>
</body>
</html>
