<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор экзамена: Безопасность Windows</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0d0f14;
            --surface:  #161921;
            --surface2: #1e2230;
            --border:   #2a2f40;
            --accent:   #5c6fff;
            --accent2:  #a78bfa;
            --success:  #22c55e;
            --error:    #f43f5e;
            --text:     #e2e8f0;
            --muted:    #64748b;
            --tag-bg:   #1e2a4a;
            --tag-fg:   #818cf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px 40px;
            display: flex;
            justify-content: center;
            background-image:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(92,111,255,.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(167,139,250,.08) 0%, transparent 60%);
        }

        .wrap { max-width: 860px; width: 100%; }

        /* HEADER */
        header { text-align: center; margin-bottom: 28px; padding-top: 8px; }
        h1 {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 800;
            letter-spacing: -.02em;
            background: linear-gradient(135deg, #818cf8, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: var(--muted); font-size: .85rem; margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            text-align: center;
        }
        .stat-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-family: 'JetBrains Mono', monospace; }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--accent2); margin-top: 2px; }

        /* PROGRESS BAR */
        .progress-wrap { height: 4px; background: var(--border); border-radius: 99px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s ease; }

        /* MODULE FILTER */
        .filters {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center;
        }
        .filter-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: .72rem;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            transition: all .2s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            background: var(--tag-bg);
            color: var(--tag-fg);
        }

        /* CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: clamp(20px, 4vw, 36px);
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            min-height: 420px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            opacity: .6;
        }

        .q-module {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: .7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--tag-bg);
            color: var(--tag-fg);
            border: 1px solid rgba(92,111,255,.3);
            margin-bottom: 16px;
        }

        .q-text {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            font-weight: 600;
            line-height: 1.55;
            margin-bottom: 24px;
            color: var(--text);
        }

        .options { display: grid; gap: 10px; }

        .opt {
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all .18s;
            font-size: .95rem;
            line-height: 1.45;
            color: var(--text);
            text-align: left;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .opt-letter {
            font-family: 'JetBrains Mono', monospace;
            font-size: .75rem;
            font-weight: 700;
            color: var(--muted);
            min-width: 20px;
            padding-top: 2px;
            transition: color .18s;
        }
        .opt:hover:not([data-locked]) {
            border-color: var(--accent);
            background: rgba(92,111,255,.07);
        }
        .opt:hover:not([data-locked]) .opt-letter { color: var(--accent); }
        .opt.correct { background: rgba(34,197,94,.1); border-color: var(--success); }
        .opt.correct .opt-letter { color: var(--success); }
        .opt.wrong   { background: rgba(244,63,94,.1);  border-color: var(--error); }
        .opt.wrong   .opt-letter { color: var(--error); }

        /* EXPLANATION */
        .explanation {
            margin-top: 16px;
            padding: 14px 16px;
            background: rgba(92,111,255,.07);
            border: 1px solid rgba(92,111,255,.2);
            border-radius: 12px;
            font-size: .88rem;
            line-height: 1.55;
            color: #a5b4fc;
            display: none;
        }
        .explanation.show { display: block; }

        /* CONTROLS */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 24px;
            margin-top: auto;
            gap: 12px;
        }
        .btn {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: .9rem;
            padding: 11px 22px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all .18s;
        }
        .btn-prev {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .btn-prev:hover { color: var(--text); border-color: var(--accent); }
        .btn-next {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
        }
        .btn-next:disabled { opacity: .35; cursor: not-allowed; }
        .btn-next:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(92,111,255,.4); }

        .shuffle-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: .78rem;
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            transition: all .18s;
        }
        .shuffle-btn:hover { border-color: var(--accent2); color: var(--accent2); }

        /* RESULT SCREEN */
        .result-screen {
            text-align: center;
            padding: 40px 20px;
        }
        .result-score {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .result-label { color: var(--muted); margin: 8px 0 24px; font-family: 'JetBrains Mono', monospace; font-size: .9rem; }
        .result-msg { font-size: 1.1rem; margin-bottom: 28px; color: var(--text); }
        .btn-restart {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            padding: 13px 32px;
            font-size: 1rem;
        }
        .module-scores { margin-top: 28px; text-align: left; }
        .module-score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: .88rem;
        }
        .module-bar { flex: 1; height: 6px; background: var(--border); border-radius: 99px; margin: 0 14px; overflow: hidden; }
        .module-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>Симулятор экзамена: Безопасность Windows</h1>
        <p class="subtitle">63 вопроса · 6 практических модулей</p>
    </header>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">Модуль</div>
            <div class="stat-value" id="s-module" style="font-size:.85rem">—</div>
        </div>
        <div class="stat">
            <div class="stat-label">Вопрос</div>
            <div class="stat-value"><span id="s-cur">0</span> / <span id="s-tot">0</span></div>
        </div>
        <div class="stat">
            <div class="stat-label">Верно</div>
            <div class="stat-value" id="s-score">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Точность</div>
            <div class="stat-value" id="s-pct">—</div>
        </div>
    </div>

    <div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>

    <div class="filters" id="filters"></div>

    <div class="card" id="card">
        <div id="quiz-area"></div>
        <div class="explanation" id="explanation"></div>
        <div class="controls">
            <button class="btn btn-prev" onclick="prevQ()">← Назад</button>
            <button class="shuffle-btn" onclick="shuffleAll()">⇄ Перемешать</button>
            <button class="btn btn-next" id="next-btn" onclick="nextQ()" disabled>Следующий →</button>
        </div>
    </div>

    <div class="card hidden" id="result-card">
        <div class="result-screen">
            <div class="result-score" id="r-score"></div>
            <div class="result-label" id="r-label"></div>
            <div class="result-msg" id="r-msg"></div>
            <button class="btn btn-restart" onclick="restart()">Пройти снова</button>
            <div class="module-scores" id="r-modules"></div>
        </div>
    </div>
</div>

    "Запись создана более 6 месяцев назад и ни разу не обновлялась."
  ],
  correct:2,
  exp:"Легитимные программы обычно имеют понятные имена и находятся в Program Files. Вредоносы прячутся во временных папках, маскируются под документы (.pdf.exe) и не имеют подписи."
},
{
  lab:"Реестр",
  q:"Где физически хранятся файлы системного реестра (ульи) в Windows?",
  opts:[
    "В скрытой папке C:\\Registry\\ в корне системного диска.",
    "Исключительно в оперативной памяти; на диск сохраняются только при завершении работы.",
    "Системные ульи — в C:\\Windows\\System32\\config, пользовательский профиль — в C:\\Users\\<имя>\\NTUSER.DAT.",
    "В папке C:\\Windows\\SysWOW64\\hives в зашифрованном виде."
  ],
  correct:2,
  exp:"Основные файлы-ульи: SYSTEM, SOFTWARE, SECURITY, SAM — все в System32\\config. Профиль каждого пользователя — NTUSER.DAT в его папке. Эти файлы заблокированы системой и не копируются обычными средствами."
},
{
  lab:"Реестр",
  q:"Что означает параметр Userinit в разделе Winlogon и какое значение считается безопасным?",
  opts:[
    "Параметр задаёт тему оформления рабочего стола; безопасное значение — «Aero».",
    "Параметр указывает программу, запускаемую после успешного входа пользователя; безопасное значение — C:\\Windows\\system32\\userinit.exe, (с запятой в конце).",
    "Параметр задаёт минимальную длину пароля при инициализации пользователя; безопасное значение — не менее 8.",
    "Параметр определяет время ожидания до автоматической блокировки экрана; безопасное значение — 300 секунд."
  ],
  correct:1,
  exp:"Userinit запускает оболочку пользователя (по умолчанию userinit.exe → explorer.exe). Вредоносы дописывают свой путь через запятую: userinit.exe,C:\\malware.exe — это классический метод закрепления."

];

// ─── STATE ────────────────────────────────────────────────────────────────────
let pool = [];
let idx = 0;
let score = 0;
let answered = false;
let activeModule = "Все";
let moduleScores = {};

const MODULES = ["Все","Аудит","MMC","КриптоПро","Защита","Комплексная","Реестр"];
const LETTERS = ["А","Б","В","Г"];

// ─── INIT ─────────────────────────────────────────────────────────────────────
function buildFilters() {
    const cont = document.getElementById('filters');
    cont.innerHTML = '';
    MODULES.forEach(m => {
        const b = document.createElement('button');
        b.className = 'filter-btn' + (m === activeModule ? ' active' : '');
        b.textContent = m === "Все" ? `Все (${BANK.length})` : `${m} (${BANK.filter(q=>q.lab===m).length})`;
        b.onclick = () => { activeModule = m; init(); buildFilters(); };
        cont.appendChild(b);
    });
}

function init() {
    const src = activeModule === "Все" ? BANK : BANK.filter(q => q.lab === activeModule);
    pool = src.map(q => {
        // shuffle options while tracking correct
        const paired = q.opts.map((o, i) => ({text: o, orig: i}));
        for (let i = paired.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [paired[i], paired[j]] = [paired[j], paired[i]];
        }
        const newCorrect = paired.findIndex(p => p.orig === q.correct);
        return { lab: q.lab, q: q.q, opts: paired.map(p => p.text), correct: newCorrect, exp: q.exp };
    });

    // init module tracking
    moduleScores = {};
    MODULES.slice(1).forEach(m => moduleScores[m] = {right:0, total:0});
    pool.forEach(q => { if(moduleScores[q.lab]) moduleScores[q.lab].total++; });

    idx = 0; score = 0; answered = false;
    document.getElementById('s-score').textContent = '0';
    document.getElementById('s-pct').textContent = '—';
    document.getElementById('s-tot').textContent = pool.length;
    document.getElementById('result-card').classList.add('hidden');
    document.getElementById('card').classList.remove('hidden');
    render();
}

function shuffleAll() {
    // re-shuffle pool order
    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    idx = 0; score = 0; answered = false;
    Object.values(moduleScores).forEach(v => { v.right = 0; });
    document.getElementById('s-score').textContent = '0';
    document.getElementById('s-pct').textContent = '—';
    render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
    if (idx >= pool.length) { showResult(); return; }
    const q = pool[idx];
    answered = false;
    document.getElementById('next-btn').disabled = true;
    document.getElementById('s-module').textContent = q.lab;
    document.getElementById('s-cur').textContent = idx + 1;

    const pct = Math.round((idx / pool.length) * 100);
    document.getElementById('progress').style.width = pct + '%';

    const exp = document.getElementById('explanation');
    exp.textContent = '';
    exp.classList.remove('show');

    document.getElementById('quiz-area').innerHTML = `
        <div class="q-module">📂 ${q.lab}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">
            ${q.opts.map((o, i) => `
                <button class="opt" onclick="pick(this,${i},${q.correct},'${(q.exp||'').replace(/'/g,"\\'")}')" data-i="${i}">
                    <span class="opt-letter">${LETTERS[i]}</span>
                    <span>${o}</span>
                </button>
            `).join('')}
        </div>
    `;
}

// ─── ANSWER ───────────────────────────────────────────────────────────────────
function pick(el, sel, correct, expText) {
    if (answered) return;
    answered = true;

    document.querySelectorAll('.opt').forEach(o => o.setAttribute('data-locked','1'));

    if (sel === correct) {
        el.classList.add('correct');
        score++;
        moduleScores[pool[idx].lab].right++;
        document.getElementById('s-score').textContent = score;
    } else {
        el.classList.add('wrong');
        document.querySelector(`.opt[data-i="${correct}"]`).classList.add('correct');
    }

    const answered_count = idx + 1;
    document.getElementById('s-pct').textContent = Math.round((score / answered_count) * 100) + '%';

    if (expText) {
        const exp = document.getElementById('explanation');
        exp.textContent = '💡 ' + expText;
        exp.classList.add('show');
    }

    document.getElementById('next-btn').disabled = false;
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function nextQ() {
    if (!answered) return;
    idx++;
    render();
}
function prevQ() {
    if (idx > 0) { idx--; score = Math.max(0, score); render(); }
}

// ─── RESULT ───────────────────────────────────────────────────────────────────
function showResult() {
    document.getElementById('card').classList.add('hidden');
    const rc = document.getElementById('result-card');
    rc.classList.remove('hidden');
    const total = pool.length;
    const pct = Math.round((score / total) * 100);

    document.getElementById('r-score').textContent = `${score} / ${total}`;
    document.getElementById('r-label').textContent = `${pct}% правильных ответов`;

    let msg = '';
    if (pct >= 90)       msg = '🏆 Отлично! Материал освоен на отлично.';
    else if (pct >= 75)  msg = '👍 Хорошо! Ещё немного практики — и будет отлично.';
    else if (pct >= 55)  msg = '📚 Неплохо, но есть пробелы. Пересмотрите слабые модули.';
    else                 msg = '🔄 Нужно повторить практики. Не сдавайтесь!';
    document.getElementById('r-msg').textContent = msg;

    const labs = Object.entries(moduleScores).filter(([,v]) => v.total > 0);
    document.getElementById('r-modules').innerHTML = `
        <div style="font-weight:700;margin-bottom:12px;font-size:.9rem;color:var(--muted)">РЕЗУЛЬТАТЫ ПО МОДУЛЯМ</div>
        ${labs.map(([name, v]) => {
            const p = Math.round((v.right / v.total) * 100);
            return `
            <div class="module-score-row">
                <span style="min-width:110px;font-family:'JetBrains Mono',monospace;font-size:.78rem">${name}</span>
                <div class="module-bar"><div class="module-bar-fill" style="width:${p}%"></div></div>
                <span style="min-width:60px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--accent2)">${v.right}/${v.total} (${p}%)</span>
            </div>`;
        }).join('')}
    `;
}

function restart() {
    document.getElementById('result-card').classList.add('hidden');
    init();
}

// ─── START ────────────────────────────────────────────────────────────────────
buildFilters();
init();
</script>

</html>
