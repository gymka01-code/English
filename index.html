<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSecurity Словарь и Тренировка</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --gray: #6b7280;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { text-align: center; color: var(--primary); }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        button.secondary { background-color: var(--gray); }
        
        /* Карточка тренировки */
        #training-section, #dictionary-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
        }
        
        .training-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
        }

        .range-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 16px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
        }
        
        .flashcard {
            text-align: center;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .term { font-size: 26px; font-weight: bold; margin-bottom: 15px; color: var(--primary); }
        .answer-area { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; width: 100%; }
        .translation { font-size: 22px; font-weight: 600; margin-bottom: 15px; color: #111827; }
        .description { font-size: 16px; color: var(--gray); text-align: left; line-height: 1.6; background: #f9fafb; padding: 15px; border-radius: 8px;}
        
        .card-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .progress { margin-top: 15px; color: var(--gray); font-size: 14px; text-align: center;}

        /* Словарь */
        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .dict-item {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        .dict-item:last-child { border-bottom: none; }
        .dict-index { color: var(--gray); font-size: 12px; margin-bottom: 4px;}

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>CyberSecurity Словарь</h1>

    <div class="nav-buttons">
        <button onclick="showSection('training')">Режим тренировки</button>
        <button class="secondary" onclick="showSection('dictionary')">Полный словарь</button>
    </div>

    <!-- Режим Тренировки -->
    <div id="training-section">
        <div class="training-controls">
            <div class="range-selector">
                <label>Учить слова с:</label>
                <input type="number" id="start-idx" value="1" min="1">
                <label>по:</label>
                <input type="number" id="end-idx" value="20" min="1">
                <button onclick="startTraining()">Начать</button>
            </div>
            <label class="toggle-container">
                <input type="checkbox" id="reverse-mode" style="width: 18px; height: 18px;">
                Показывать Русский (угадывать Английский)
            </label>
        </div>

        <div id="flashcard-container" class="hidden">
            <div class="flashcard">
                <div class="term" id="fc-term">Слово</div>
                <div class="answer-area" id="fc-answer">
                    <div class="translation" id="fc-translation">Перевод</div>
                    <div class="description" id="fc-desc">Описание</div>
                </div>
            </div>
            <div class="card-controls">
                <button id="btn-show" onclick="showAnswer()">Показать ответ</button>
                <button id="btn-next" onclick="nextCard()" class="hidden">Следующее слово ➔</button>
            </div>
            <div class="progress" id="fc-progress"></div>
        </div>
    </div>

    <!-- Режим Словаря -->
    <div id="dictionary-section" class="hidden">
        <input type="text" id="search-input" class="search-box" placeholder="Поиск по терминам, переводам и описанию..." onkeyup="filterDictionary()">
        <div id="dict-info" style="margin-bottom: 10px; color: var(--gray); font-size: 14px;"></div>
        <div id="dict-list"></div>
    </div>

<script>
// Вставляем все 330 слов
const rawText = `
1. active attack – активная атака # в ИБ – атака, которая приводит к изменению функций и параметров системы или изменению данных, к нарушению интерактивных операций и взаимодействий в сети и др. Примеры подобных атак – impersonation, man-in-the-middle attack, session hijacking (см. также passive attack).
2. active cyberdefence (также active cyber defense, ACD) – активная кибероборона # проводимые в реальном времени координированные комплексные мероприятия, направленные на обнаружение, идентификацию, анализ и смягчение вредоносных последствий в случае кибератак с использованием уязвимостей компьютерной системы, сети (см. также cyberdefence, security).
3. antivirus (также anti-virus, antivirus program) – 1. антивирус, антивирусная программа # приложение, предназначенное для обнаружения и удаления компьютерных вирусов. Хотя даже самый лучший антивирус не может на 100% гарантировать защиту от неизвестных вирусов, тем не менее, антивирусы защищают от миллионов уже известных вредоносных программ и ими настоятельно рекомендуется пользоваться. Чтобы антивирусное ПО было эффективно, оно должно быть установлено на каждом компьютере сети. При этом следует учитывать, что антивирусы снижают общую производительность компьютерной системы. Пример: Anti-virus software consists of two parts: the scanning engine and the signature files. – Антивирусное ПО состоит из двух частей: это сканирующий движок и файлы (базы) сигнатур. Написание английского термина через дефис встречается чаще в Европе; например, desktop anti-virus – антивирус для ПК; anti-virus update – обновление антивируса (см. также antivirus app, anti-virus policy, antivirus protection, antivirus software, signature analysis, virus, virus protection);
2. противовирусный, антивирусный.
4. antivirus app – антивирусное приложение # например, antivirus app interface – интерфейс антивирусного приложения (см. также antivirus).
5. anti-virus personnel (также anti-virus support personnel) – персонал службы поддержки антивирусов # занимается установкой, обновлением и обслуживанием антивирусных программ в организации (см. также antivirus).
6. anti-virus policy – антивирусная политика # совокупность правил (политик), обеспечивающих защиту корпоративных ресурсов от вирусов (см. также antivirus).
7. antivirus protection – антивирусная защита # комплекс организационных мер и программных средств, направленных на защиту от компьютерных вирусов. Существует множество различных вариантов антивирусной защиты. Синоним – virus protection (см. также antivirus, antivirus software, malicious website).
8. bacterium (мн. ч. bacteria) – бактерия, микроб # тип компьютерного вируса, последовательно саморазмножающегося и заполняющего в итоге всю систему (пожирающего её ресурсы) (см. также virus, worm).
9. bankcard fraud – мошенничество с банковскими карточками # см. также bank card, carding, fraud.
10. banker Trojan – банковский троянец, троянец для банковских систем # особая разновидность троянца, вирусного ПО, специально созданного для кражи банковских реквизитов и других конфиденциальных данных, хранящихся и обрабатываемых в онлайновых банковских системах (см. также online banking, Trojan).
11. behaviour (брит. behavior) – поведение # в ИБ, применительно к компьютерному вредоносному ПО – действия и операции, которые выполняет вредоносная программа в заражённой системе при своём запуске (см. также malware).
12. behavioural anomaly detection (BAD) – обнаружение аномальной активности, технология BAD # технологии обнаружения зловредного ПО, обнаружения и предотвращения НСД, основанные на анализе действий, выполняемых программой или пользователем (см. также malver).
13. behaviour blocker (также behavior blocker) – поведенческий блокиратор; блокиратор (механизм блокирования) программ с подозрительным поведением # в отличие от сигнатурных или эвристических анализаторов (входящих в состав средств ИБ) интегрируется с ОС хост-компьютера и в реальном времени следит за поведением выполняющихся программ; в случае обнаружения подозрительных действий может их заблокировать, прежде чем они нанесут вред системе, и/или удалить такую программу (см. также behavior monitoring, heuristic analyzer, proactive security, signature).
14. benign environment – благоприятная среда, защищённая среда # в ИБ – помещение, территория, зона с защитой от внешних враждебных или вредоносных элементов при помощи физических, кадровых или процедурных мер безопасности (см. также security).
15. biometric data (также biometrical data) – биометрические данные # хранимые в электронной форме данные, используемые для биометрической идентификации и/или аутентификации пользователя. Это могут быть изображения в исходном или сжатом виде либо те или иные уникальные биометрические характеристики (тембр голоса, рисунки сетчатки и радужной оболочки глаза, структура лица, форма кисти руки, отпечатки пальцев и т. д.) (см. также authentication, biometric authentication, biometric identification, biometric personal data, biometric sample, biometrics).
16. biometric identification – биометрическая идентификация, биоидентификация # совокупность биометрических способов идентификации пользователя, основанная на уникальности характеристик человеческого тела. Например, biometric identification service – служба биометрической идентификации (см. также biometric authentication, biometric data, biometric measurement, biometrics, fingerprint verification, identification, multimodal biometric identification).
17. black hat hacker – зловредный (чёрный) хакер # синонимы – dark-side hacker, malicious hacker (см. также hacker, hacking).
18. blacklist (также black list) – чёрный список # 1. в ИБ – список ресурсов, объектов, систем, хостов, приложений, которые ранее были связаны с вредоносными атаками, операциями и считаются поэтому опасными для организации, страны; 2. записи в базе данных, перечисляющие все устройства, смарт-карты и иные объекты, которые запрещается использовать с конкретным приложением. Синоним – negative file; 3. список абонентов/серверов электронной почты, которые ранее посылали спам пользователю; список доменов и/или IP-адресов сетевых объектов, хост-компьютеров, приложений, которые ранее были замечены во вредоносных или подозрительных действиях. Чёрные списки используются в системах ИБ для защиты пользователей – для блокировки поступления сообщений электронной почты с серверов или посещения сайтов, адреса которых перечисляются в этих списках; 4. список (словарь) заранее определённых понятий, терминов, которые считаются неприемлемыми для употребления в документах, письмах организации (см. также blacklisting, dirty word list, graylist, hotlist, whitelist).
19. blacklisting – технология “чёрных списков” # в ИБ – 1. определение списка ресурсов, объектов, систем, хостов, приложений, которые считаются подозрительными, непроверенными и небезопасными для общения, обмена данными, сообщениями и др. Одно из средств борьбы со спамом – заключается в составлении и ведении списков DNS подозрительных серверов (DNSBL), почта от которых блокируется. Метод не эффективен, так как спам в настоящее время чаще всего рассылается с “зомбированных” компьютеров, находящихся в самых разных частях планеты; 2. обнаружение, идентификация и перечисление программ, не авторизованных для выполнения на данной компьютерной системе; 3. выявление опасных веб-сайтов (см. также blacklist, greylisting, whitelisting).
20. blackmail – 1. шантаж, шантажирование; вымогательство # например, large-scale blackmail – крупномасштабное вымогательство. Синоним – extortion;
2. шантажировать; вымогать деньги.
21. botnet – от robot + network – сеть зомбированных компьютеров, зомби-сеть # сеть компьютеров, инфицированных вирусом таким образом, чтобы ими можно было пользоваться (управлять) удалённо, например для рассылки спама, майнинга криптовалюты или выполнения других задач и атак. Синоним – zombie army, армия зомби (см. также botmaster, zombie computer).
22. bug bounty – премия (премирование) за обнаружение уязвимости (ошибки, дефекта) # в ИБ – меры стимулирования пользователей, бета-тестеров и белых (этических) хакеров, чтобы они старались обнаруживать в аппаратных и программных продуктах уязвимости, ошибки, дефекты и сообщать о них компаниям-разработчикам этих продуктов. Компании могут за полезные результаты поощрять участников программы денежными вознаграждениями и/или награждать почётными грамотами (свидетельствами, сертификатами) (см. также beta testing, bounty, bug, bug bounty program, ethical hacker, security, vulnerability).
23. cyber attack (также cyber-attack) – кибератака, атака из киберпространства (в киберпространстве) # атака, проводимая с помощью [специальных] программных и аппаратных средств на компьютерные сети и компьютерные системы противника с целью нарушения их работоспособности или для вредоносного управления компьютерным оборудованием/инфраструктурой, либо разрушения целостности данных или завладения информацией (данными). Кибератаки – политически мотивированные или направленные на достижение чисто финансовой выгоды, – являются инструментами и составляющими кибертерроризма (cyber-terrorism) и киберпреступности (cybercrime). Например, risk of cyber attacks – риск кибератак. Синонимы – cyber penetration, online attack (см. также cyber attacker, cybercrime, cybersecurity, cyberwarfare, state-sponsored online attack).
24. cyber attacker – кибервзломщик – см. attacker.
25. cyberbullying – кибербуллинг # травля, оскорбления или угрозы, высказываемые жертве через социальные сети или другие средства электронных коммуникаций. Синонимы – cyberharassment, online bullying.
26. cyber conflict – киберконфликт # конфликт в киберпространстве (см. также cyberspace, cyberwarfare).
27. cybercop – 1. компьютерный полицейский, киберполицейский, киберсыщик, кибердетектив, разг. киберкоп # персона (или ПО), занимающаяся расследованием онлайновых преступлений или преследований (см. также cybercrime);
2. цензор.
28. cybercrime (также cyber crime) – киберпреступность, киберпреступления # литературное название преступлений, основным инструментом которых являются информационно-телекоммуникационные технологии, компьютеры и компьютерные сети. Это, например, такие традиционные преступления, как мошенничества, вымогательства (blackmail), хищения личных данных, но совершаемые через Интернет и/или с применением вычислительных устройств. Киберпреступность быстро стала серьёзной мировой проблемой – ввиду резкого роста числа пользователей компьютеров, смартфонов и др., и того факта, что для неё не существует никаких границ, что существенно затрудняет обнаружение и наказание киберпреступников. Отдельным видом киберпреступности является кибертерроризм. Синоним – computer crime (см. также также computer criminal, criminal application, criminal attack, criminal case, criminal infrastructure, cybercop, cybercriminal, cyberlaw, cybershenanigans, cyber-terrorism, digital forensics, financial crime, fraud, identity theft, www.cybercrime.gov).
29. cybercriminal (также cyber criminal) – киберпреступник # пример: Our goal is to be steps ahead of hackers and cybercriminals, who are attempting to exploit flaws in computer platforms and applications for their profit. – Наша цель в том, чтобы всегда на несколько шагов опережать хакеров и киберпреступников, пытающихся использовать уязвимости компьютерных платформ и приложений для своей выгоды (см. также cybercrime).
30. cybercriminal organization – кибер-ОПГ (организованная преступная группа), киберкриминальная структура (организация) # организация, занимающаяся преступной деятельностью в киберпространстве (см. также cybercriminal).
31. cyberdefense (амер. cyberdefence) – кибероборона, обеспечение кибербезопасности # см. также cybersecurity.
32. cyber detective – кибердетектив # детектив, расследующий компьютерные преступления (см. также cybercop).
33. cyber incident (также cybersecurity incident) – киберинцидент # злоумышленные действия с использованием компьютерных сетей, приводящие к реальному или потенциальному нарушению работоспособности компьютерной системы (систем) и/или разрушению (утечке, модификации и т. п.) хранящихся в ней данных (информации). Например, malicious cyber incident – вредоносный киберинцидент (см. также cybersecurity, incident).
34. cyberlaw – Интернет-право, киберправо # законы, относящиеся к Интернету и компьютерным правонарушениям (computer offense), в том числе к нарушениям авторского права (copyright infringement) и различным видам мошенничества (fraud) (см. также cybercrime).
35. cyber operation – кибероперация # в кибервойне (см. также cyberwarfare).
36. cyber penetration – кибервзлом, кибератака – см. cyber attack.
37. cyber protection – киберзащита, защита от киберугроз # например, cyber protection capability – возможности киберзащиты (см. также cybersecurity, cyber threat).
38. cyber resilience – устойчивость к киберугрозам (кибератакам), киберустойчивость # см. также cybersecurity, cyber threat.
39. cyber risk – киберугроза, риск (угроза) кибербезопасности (компьютерной безопасности, ИБ) # пример: No country, industry, community or individual is immune to cyber risks. – Никто сейчас не застрахован (не защищён) от киберугроз – ни государство, ни индустрия, ни общество, ни личность (см. также cybersecurity, cyber threat).
40. cybersecurity (также cyber security, cyberspace security) – безопасность в киберпространстве, кибербезопасность (КБ), Интернет-безопасность # комплекс технических, технологических, инфраструктурных и законодательных мер, процессов и практик, обеспечивающих эффективное обнаружение кибератак (cyber attack) и противодействие им, то есть защиту киберпространства (компьютерных сетей, устройств, программ и данных) от подобных атак. Кибербезопасность является составной частью Интернет-безопасности. Требует подготовки соответствующих специалистов-профессионалов; в современных условиях всепроникающей компьютеризации приобретает всё более важное значение для государства, промышленности, общества и каждого человека. Современный кибертерроризм является составной частью гибридных войн и одним из действенных рычагов достижения политических целей на международной арене. Особенностью кибертерроризма является стремление атакующих сделать совершённый террористический акт не только имеющим опасные последствия, но широко известным населению, чтобы он получил большой общественный резонанс. Например, cybersecurity risk management – управление рисками в области кибербезопасности (ИБ); cyber security expert – эксперт по кибербезопасности. Синоним – information technology security (см. также airport cybersecurity, cyberdefense, cyber incident, cyber potential, cyber protection, cyber risk, cybersecurity analyst, cybersecurity application, cybersecurity certificate, cybersecurity employer, cybersecurity expert, cybersecurity infrastructure, cybersecurity market, cybersecurity report, cybersecurity technology, cyber threat, information security, Internet security, malicious circuit, security, security operations center, threat intelligence).
41. cybersecurity adviser – советник по кибербезопасности (КБ) # должность в ряде правительственных организаций США (см. также cybersecurity).
42. cybersecurity analyst – аналитик по вопросам кибербезопасности (КБ) # специальность в организациях, занимающихся ИБ (см. также cybersecurity, cybersecurity researcher).
43. cybersecurity application – приложение для кибербезопасности (КБ) # см. также application, cybersecurity.
44. cybersecurity business – бизнес в области кибербезопасности (КБ) # см. также cybersecurity.
45. cybersecurity certificate – сертификат (аттестат, диплом) специалиста по кибербезопасности (КБ) – см. cybersecurity.
46. cybersecurity employer – работодатель для специалистов по кибербезопасности (КБ) – см. cybersecurity.
47. cybersecurity expert – эксперт по (в области) кибербезопасности (КБ) # см. также cybersecurity.
48. cybersecurity hardening (также hardening) – повышение уровня ИБ, уровня кибербезопасности (КБ), устойчивости, робастности системы # в ИБ – достигается, в частности, путём составления, измерения, анализа и сокращения поверхности атаки и поверхности уязвимостей системы. Для ПО это выявление и удаление необязательных функций, кодов, логинов, сервисов – векторов атаки. В компьютерных системах обычно предусматривается создание многоуровневой защиты – с применением средств противодействия вредоносному ПО (malware), с регулярной диагностикой средств безопасности и регулярным обновлением ПО при помощи “заплаток” от изготовителей, с удалением ненужных приложений, с физической изоляцией от небезопасных сетей и др. (см. также air gap, antispyware, antivirus, attack, attack surface, cybersecurity hardening guide, defense in depth, information security, robustness, security diagnosis, vulnerability, vulnerability surface).
49. cybersecurity hardening guide – руководство по повышению кибербезопасности (КБ) – см. cybersecurity hardening.
50. cybersecurity incident (также cyber security incident) – нарушение кибербезопасности (КБ), киберинцидент; инцидент в области кибербезопасности – см. cyber incident.
51. cybersecurity infrastructure – инфраструктура кибербезопасности (КБ), инфраструктура КБ # см. также cybersecurity, infrastructure.
52. cybersecurity market (также cyber security market) – рынок средств кибербезопасности, рынок КБ # этот рынок включает такие средства и решения, как управление инцидентами нарушения безопасности (security incident management); Единая система защиты от угроз, мультифункциональные защитные устройства (Unified Threat Management, UTM); управление рисками и контроль соответствия руководящим документам (risk and compliance management) и Система идентификации и управления доступом (Identity and Access Management, IdM, IAM). Этот комплекс решений позволяет организациям обезопасить свою инфраструктуру и данные от вредоносных киберугроз и уязвимостей (см. также cybersecurity, security, security incident, threat, vulnerability).
53. cybersecurity report – сообщение о нарушении кибербезопасности (КБ), отчёт о компьютерной безопасности # см. также cybersecurity.
54. cybersecurity researcher – исследователь[, работающий] в области кибербезопасности (КБ) # см. также cybersecurity analyst.
55. cybersecurity solution (также cyber security solution) – решение в области кибербезопасности (КБ) – см. security solution.
56. cybersecurity spending – расходы на кибербезопасность # см. также cybersecurity, IT security investment.
57. cybersecurity strategy – стратегия [обеспечения] кибербезопасности (КБ) # это может быть как предмет обсуждений и исследований, так и основная функция, ответственность группы, работающей в компании по данному направлению (см. также cybersecurity, strategy).
58. cybersecurity technology – технология кибербезопасности (КБ) – см. cybersecurity.
59. cybershenanigans – махинации с использованием сетевых компьютеров, кибермахинации # см. также cybercrime.
60. cybersleuth – кибердетектив, киберсыщик # см. также cybercrime.
61. data breach – утечка данных; уязвимость данных; несанкционированный доступ к данным # одна из главных проблем ИБ, чреватая большим материальным ущербом и риском других потерь. Для предотвращения этих потерь принимаются самые разные способы защиты – аппаратные, программные, организационные и др. Например, average cost of a data breach – средняя стоимость утечки данных (средняя величина ущерба, потерь от инцидент утечки данных) (см. также data breach notification, data security, malicious breach).
62. data leakage – утечка данных # воровство корпоративных данных злоумышленниками в результате несанкционированного доступа или нелояльными служащими, инсайдерами, производимое с различными целями (для продажи, компрометации данных и др.) (см. также data leak prevention, data security, data theft, leakage, loss of data).
63. data privacy – конфиденциальность (приватность) данных # в ИБ – требует специальных мер по защите данных от несанкционированного доступа (НСД), неавторизованных изменений и др. (см. также confidentiality, data privacy policy, data privacy regulations, data protection, security).
64. data security – защита (защищённость, безопасность) данных # защита данных от неавторизованного (случайного или преднамеренного) раскрытия, модификации или разрушения; обеспечение конфиденциальности, целостности и доступности данных (информации). Достигается применением аппаратных, программных и криптографических методов и средств защиты, а также комплексом организационных мероприятий. Например, industry data security standard – отраслевой стандарт по безопасности данных (см. также confidentiality, corporate data security, data breach, data control, data leakage, data modification, data protection, data room, file encryption, information security, security).
65. defense in depth (также defense-in-depth, defence in depth) – многоуровневая защита [системы, сети, организации] # стратегия обеспечения ИБ с использованием человеческого фактора, технологических и операционных методов и средств – создание нескольких уровней (слоёв, барьеров) средств и способов обеспечения защиты системы (компьютера, приложения) и/или организации (см. также antivirus, hardening, information security, vulnerability).
66. destruction – уничтожение, разрушение # в ИБ и криптографии – процесс перезаписи, стирания или физического разрушения информации (например, цифровых, электронных секретных данных, криптографических ключей, учётных данных и др.) таким образом, чтобы её невозможно было восстановить и использовать. Синонимы – demolition, disintegration (см. также data destruction, deletion, wipe, zeroization).
67. disclose information – разглашать информацию # см. также disclosure.
68. disclosure – демаскирование, раскрытие; разглашение; открытие; разоблачение; обнаружение # в ИБ – information disclosure (disclosure of information, divulge information) – раскрытие или разглашение секретной (конфиденциальной, корпоративной и др.) информации лицам, доступ которым к ней запрещён (см. также inadvertent disclosure, nondisclosure agreement, security, STRIDE, unauthorized disclosure, vulnerability disclosure).
69. DMZ – demilitarized zone – демилитаризованная зона # часть компьютерной сети, находящаяся логически между локальной сетью и Интернетом. Обеспечивает выход в Интернет и присутствие в нём, скрывая при этом внутреннюю сеть организации и предотвращая прямое обращение к ней, т. е. защищая от внешних атак соответственно принятой политике безопасности (см. также attack, firewall, IDS, LAN, security, security perimeter).
70. downgrade (также downgrading) – 1. понижение уровня, категории (качества, секретности, защищённости, ответственности, прав доступа и др.) # в ИБ – авторизованное снижение степени защищённости конкретной секретной информации, например перевод информации и/или компьютерной системы с умеренного (moderate impact) на низкий (low impact) уровень риска, уязвимости (см. также classified information, declassification, downgraded, high impact, impact, security, vulnerability);
2. понижение (в звании, должности, статусе, оценке и т. п.).
71. DPaaS – Data Protection as a Service, Data Protection-as-a-Service – защита данных (ЗД) как услуга (как сервис), модель (технология) обеспечения сохранности данных DPaaS # см. также BURR, data protection, service.
72. DSO – Data Security Officer – ответственный за безопасность данных # сотрудник, отвечающий за обеспечение безопасности обработки данных в системе и за противодействие попыткам несанкционированного к ним доступа и их использования (см. также data security, security, security administrator, security audit, security management).
73. eavesdropping – перехват, прослушка, прослушивание [передач, данных, сообщений] # перехват данных, пересылаемых по линии связи, например содержимого незащищённых транзакций. Различают пассивный перехват (passive eavesdropping) – перехват без воздействия на обмен сообщениями, и активный (active eavesdropping, active wiretap), когда атакующий не просто контролирует обмен, но и изменяет передаваемые и/или добавляет свои сообщения (см. также eavesdropping attack, eavesdropping device, interception, listening, man-in-the-middle attack, security, sniffer, tap).
74. eavesdropping attack – атака подслушиванием # вид атаки, в которой атакующий вначале пассивно прослушивает обмен данными по протоколу аутентификации, чтобы собрать информацию, которую потом можно использовать для активной атаки, представляясь легальным претендентом на установление соединения (см. также active attack, claimant, eavesdropping, passive attack).
75. electronic warfare (EW) – электронная война, война с применением электронного оружия; радиоэлектронная война, радиоэлектронная борьба (РЭБ) # радиоэлектронное подавление; противодействие радиоэлектронному подавлению со стороны противника; использование электронных устройств, работающих в электромагнитном спектре, или направленной [электромагнитной] энергии для нарушения работоспособности, вывода из строя или разрушения компьютерных и телекоммуникационных систем и ВЦ противника. Электронная война может вестись пилотными и беспилотными системами вооружения с воздуха, моря, земли, космоса, причём её целями могут быть людские ресурсы, коммуникационные системы, радиолокационные средства и/или другие виды оборудования и систем противника. Пример: Electronic warfare specialists are called “crows” because commanders referred to them by the code name “Raven” during World War II. – Специалистов по радиоэлектронной войне называют “воронами”, потому что во время Второй мировой войны командование вызывало их по кодовому слову “Ворон” (см. также information warfare).
76. enterprise security – корпоративная безопасность; политика и служба безопасности корпорации (организации) # в ИБ – методы и средства, решения и сервисы, обеспечивающие кибербезопасность (КБ) бизнеса, предприятия, организации, то есть защиту центров обработки данных (ЦОД), физических оконечных систем, мобильных устройств, электронной почты, других коммуникационных каналов от зловредного ПО и кибератак (см. также cybersecurity, security).
77. entrapment – подставка (разг. подстава); ловушка # в ИБ – провокация киберпреступления с целью его изобличения или преднамеренное внесение явных дефектов в компьютерную систему или в криптографическое оборудование с целью своевременного обнаружения попыток вредоносного проникновения (атаки) или взлома системы в процессе эксплуатации (см. также trap).
78. evidence – 1. доказательство, вещественное доказательство (вещдок); основание; свидетельство; подтверждение; улика # в ИБ – вещественное доказательство (вещдок), на основании которого можно, например, определить причину инцидента. Например, compelling evidence – убедительное доказательство (см. также body of evidence, chain of evidence, digital evidence, exculpatory evidence, incident, inculpatory evidence, objective evidence, security);
2. служить доказательством, доказывать; подтверждать # см. также tamper evidence.
79. exculpatory evidence – доказательство (доказательства) невиновности # в ИБ – исключение вины, в данном случае той или иной причины ИБ-инцидента (киберинцидента), в результате рассмотрения и анализа имеющихся вещественных доказательств (вещдоков) (см. также evidence, examination, incident, inculpatory evidence, security).
80. external security testing – внешнее тестирование средств обеспечения безопасности # тестирование средств обеспечения безопасности (средств информационной защиты), которое производится из-за границ информационной среды организации, из-за периметра безопасности (см. также security perimeter, security testing).
81. false negative (FN) – ошибочный отказ [в доступе к системе]; ложно отрицательная [аутентификация, идентификация] # в ИБ – ситуация, когда зарегистрированный (легальный) пользователь пытается пройти идентификацию по биометрическим атрибутам (например, по отпечаткам пальцев), но из-за ненадёжной работы средств контроля получает отказ (ср. false positive; см. также authentication, biometric identification, false-negative result, FAR, identification system).
82. false positive (FP) – 1. ошибочный допуск [к системе]; ложно положительная [аутентификация, идентификация] # в ИБ – ситуация, когда средства биометрической аутентификации (биометрические, двухфакторные или иные) идентифицируют атакующего, злоумышленника или просто случайного человека как зарегистрированного пользователя и ошибочно разрешают ему доступ к ресурсам и данным компьютерной системы и сети, что является серьёзным нарушением информационной безопасности (ср. false negative; см. также authentication, biometric identification, FAR, identification system);
2. ложно положительный # ошибочный результат работы программы (приложения, системы), воспринимаемый как правильный. Например, false positive alerts – ложные положительные предупреждения (см. также false-positive result).
83. file protection – защита файла (файлов) # в ИБ – совокупность процессов и процедур, призванных предотвращать несанкционированный доступ, заражение (инфицирование), удаление, модификацию или разрушение файла или каких-либо частей его контента; обеспечивается на уровне ОС путём разделения (разграничения) прав доступа (см. также file, file security).
84. file sandboxing – проверка файла (файлов) в песочнице # в ИБ – анализ поведения неизвестных (подозрительных) файлов с соблюдением максимальных мер безопасности, в изолированной защищённой среде (см. также sandbox).
85. file security – безопасность файлов # в ИБ – меры и средства, благодаря которым доступ к компьютерным файлам предоставляется только авторизованным пользователям (см. также file protection).
86. FIRST – Forum for (of) Incident and Response Security Team – Форум команд по ИБ и реакциям на инциденты ИБ, форум FIRST # всемирный форум, объединяющий все группы реагирования на нарушения информационной безопасности (CERT), которых в 2014 г. насчитывалось 304, а также занимающийся их сертификацией и определяющий правила, которые они должны соблюдать (см. также CSIRT, incident, incident response, security, www.first.org).
87. foothold expansion – букв. расширение плацдарма; упрочение позиции атакующего # в ИБ – создание атакующим дополнительных лазеек, которые используются для повторных (многократных) проникновений в систему или сеть после первоначальной инфильтрации в неё вредоносного ПО (см. также attack, back door, infiltration, malware, threat actor).
88. fraud – 1. обман, мошенничество, жульничество # пример: “The laws allow the use of monitoring where fraud or crime is suspected” (T. Shimomura). – Законодательство разрешает использовать мониторинг в случаях, когда подозревается мошенничество или преступление (Ц. Симомура). Синоним – scam (см. также adfraud, click fraud, computer fraud, consumer fraud protection, FPF, fraud detection, fraudulent, identity fraud, online fraud);
2. фрод # мошенничество с пластиковыми (банковскими, дебетовыми, кредитными) карточками и др. (см. также bankcard fraud, debit card fraud, financial security, plastic card, skimming).
89. GDPR (также EU GDPR) – General Data Protection Regulation – Общие правила защиты данных, регламент Евросоюза GDPR; закон о защите персональных данных, закон GDPR # правила защиты персональных данных (ПД), вступившие в действие 25 мая 2018 года, предусматривают жёсткие требования по сбору, хранению, передаче и любой обработке ПД всех граждан и резидентов Евросоюза и Европейской экономической зоны (ЕЭЗ, European Economic Area, EEA) и жёсткие санкции за их несоблюдение. Организации обязаны внедрить средства контроля ПД на уровне отдельных пользователей, обезличивать эти данные и удалять их по запросу соответствующего лица, вести отчётность по соблюдению этих и других требований (см. также data protection, personal data, privacy).
90. grey hat hacker – серый хакер # в хакерском сообществе так называют квалифицированного хакера, который берётся за любую работу и занимает промежуточное положение где-то между белыми и чёрными хакерами (см. также hacker, hacking, hacking community).
91. greylist (также graylist, gray list, grey list) – серый список # записи в базе данных, перечисляющие все устройства, смарт-карты и иные объекты, которые находятся под подозрением в отношении безопасности (см. также blacklisting, greylisting, hotlist, whitelist).
92. greyware (также grayware) – “серое” ПО # 1. общий термин, употребляемый иногда для обозначения приложений, которые ведут себя раздражающе или нежелательно, но при этом менее опасны и серьёзны по своим последствиям, чем вредоносное ПО; 2. вредоносные программы (malware), попадающие в “серую зону” между обычным ПО и вирусами. К этой категории относятся такие опасные и/или надоедливые программы, как adware, spyware, trackware и многие другие.
93. guard code – защитный код, код безопасности # 1. секретный пароль пользователя для разблокировки телефона/смартфона; 2. защитный код кредитной или дебетовой банковской карточки (трёхзначное или четырёхзначное число), используется обычно для обеспечения безопасности покупок через Интернет; 3. программа-аутентификатор, проверяющая при входе в систему личность пользователя и его права доступа. Частичный синоним – security code (см. также authenticator, guard, password).
94. hacker – хакер # в программистском сообществе, где возник этот термин (MIT, конец 1950-х годов), означал лицо (специалиста), пользующееся своими глубокими знаниями определённых систем и процессов для выявления в них уязвимостей и для достижения “нестандартных” целей. Среди молодых людей того времени существовала даже определённая хакерская культура, базирующаяся на принципах открытого обмена программами и приёмами конструирования аппаратуры между друзьями. Не случайно одним из истинных, белых хакеров, сообщающих разработчикам и владельцам систем об обнаруженных уязвимостях, был Ричард Столман (Richard Stallman), написавший редактор EMACS, а затем основавший FSF, а также Линус Торвальдс (Linus Torvalds), разработчик ОС Linux. Слово hacker возникло, скорее всего, от hack through – “прорубиться”. Позже, после выхода в 1983 г. фильма War Games, это слово стало ассоциироваться со словом “cracker” и людьми, злонамеренно взламывающими программы и проникающими в чужие компьютеры, к защищённым ресурсам, – зловредными хакерами (malicious hacker), серыми или чёрными хакерами (dark-side hacker). Отметим, что буквальный перевод black hat hacker – хакер в чёрной шляпе и white hat hacker – хакер в белой шляпе; эти термины появились по ассоциации с чёрно-белыми голливудскими вестернами, где в чёрных шляпах были плохие, а в белых – хорошие парни (см. также criminal hacker, ethical hacker, grey hat hacker, hackathon, hacker attack, hackerese, hacker group, hacker threat, hacking, hacking community, intruder, phreaker, script kiddie, security).
95. hacker attack (также hack attack) – атака хакеров, хакерская атака – см. attack.
96. hacker group – хакерская группа # неформальное объединение хакеров. Пример: Every minute of every day there are governments, organized crime, and hacker groups turning the doors on your house looking for an unlocked entry. – Ежедневно и ежеминутно государственные службы, организованные преступные группировки и хакерские группы ищут лазейки и пытаются проникнуть в ваш дом (в вашу систему) (см. также back door, hacker).
97. hacker-powered security (также hacker-powered security program) – обеспечение безопасности благодаря белым хакерам, программа обеспечения безопасности с участием белых хакеров # в ИБ США – программа привлечения белых (этических) хакеров для выявления уязвимостей (vulnerability disclosure) компьютерных систем; сейчас становится практически обязательной нормой для самых различных организаций, от Фейсбука (Facebook) до государственных учреждений. Так, ведущие компании США, причём не только технологические, выплачивают хакерам до 1 млн долларов в год в виде премий (bug bounty) за помощь в обнаружении уязвимостей и повышении безопасности своих компьютерных систем (сетей) и бизнес-приложений (см. также ethical hacker, security, vulnerability).
98. hacker threat – хакерская угроза # угроза безопасности компьютерной системе со стороны хакера (хакеров) (см. также threat).
99. hacking – 1. неавторизованный доступ [к компьютерным данным], проникновение [в систему], взлом программ, разг. хакерство # один из рисков ИБ – требует разнообразных мер защиты и обеспечения безопасности систем и данных (см. также attack, cybersecurity risks, data security, hacker, hacking spike, hacking techniques, hacking tool, threat);
2. проф. хакинг, хакерство # у истинных хакеров – процесс проникновения в суть той или иной вещи для понимания того, “как это работает”. Результатом такого этичного, или белого, хакинга может быть критика реализации системы, алгоритма и т. п. и предложения по устранению уязвимостей, нахождение максимально эффективного или элегантного решения задачи. Злонамеренный, или деструктивный, хакинг (destructive hacking) обычно направлен на хищение значимой информации, получение контроля над компьютером для включения его в зомби-сеть (botnet) и т. п. Пример: Among people who write code, though, the term hack refers to a “quick-and-dirty” solution to a problem, or a clever way to get something done. – Однако среди программистов термин hack обычно означает решение проблемы “на скорую руку” или искусный способ быстро добиться нужного результата (см. также ethical hacking, hacking community, hardware hacking).
100. hacking community (также hack community) – сообщество хакеров, хакерское сообщество # неформальное сообщество программистов и любителей, занимающихся хакерской деятельность (см. также hacker, hacking).
101. hacking spike – всплеск хакерской активности # см. также hacker.
102. hacking techniques – методы (приёмы) хакинга – см. hacking.
103. hacking tool – инструмент неавторизованного доступа (хакинга) # см. также hacking.
104. hardware security – 1. аппаратная защита # механические, электромеханические, электронные, оптические, лазерные, радиотехнические и другие устройства, используемые в компьютерных сетях и системах для защиты данных от несанкционированного доступа (см. также security);
2. безопасность аппаратных средств.
105. hardware vulnerability – аппаратная уязвимость, уязвимость аппаратного обеспечения # синоним – hardware weakness (см. также hardware, information security, vulnerability).
106. hardware weakness – аппаратная уязвимость # уязвимость компьютерной или сетевой системы, связанная с её аппаратным обеспечением. К таким уязвимостям, относятся, в частности аппаратные закладки. Синоним – hardware vulnerability.
107. high impact (HI, HIM, HIMP) – сильное воздействие, сильный эффект; высокая уязвимость, высокий риск, большой ущерб # в ИБ – потеря или нарушение конфиденциальности (confidentiality), целостности (integrity) или готовности (availability), в результате чего можно ожидать серьёзных или катастрофических последствий для работы организаций, для активов организаций, для физических лиц, для национальных интересов страны. Это может быть резкое снижение функциональных возможностей организации, уменьшение активов, большие финансовые убытки, тяжкие телесные повреждения или смерть людей (см. также impact, high-impact system, security).
108. high-impact system – система высокой уязвимости # в ИБ – компьютерная система, для которой как минимум один из базовых целевых показателей безопасности (конфиденциальность, целостность или готовность) имеет высокую потенциальную возможность (высокий риск) нарушения (см. также high impact, security).
109. high-tech crime (также high tech crime, hi-tech crime) – высокотехнологичное преступление; высокотехнологичная преступность # категория преступлений, связанных, в частности, с современными информационными технологиями, особенно с Интернетом, – это, например, распространение разнообразных вирусов, хакерские атаки, направленные на незаконное получение конфиденциальной, в том числе финансовой, информации, дезорганизацию работы банков, корпораций, государственных учреждений и т. п. Синонимы – computer crime, cybercrime, electronic crime, e-crime (см. также INTERPOL).
110. honeynet – сеть-приманка, сеть-ловушка # реальная или виртуальная сеть из хостов-приманок (см. также honeypot).
111. honeypot – хост-приманка, хост-ловушка # изолированный от внутренней сети хост, специально подготовленный для атак взломщиков. На таких приманках-ловушках с незакрытыми известными уязвимостями ловятся атакующие, изучаются их поведение, применяемые ими методы и инструменты (см. также cracker, honeynet).
112. human factor (HF) – человеческий фактор # самое слабое звено в компьютерной (и не только компьютерной) безопасности. Пример: “Only two things are infinite, the universe and human stupidity, and I’m not sure about the former” (Albert Einstein). – Бесконечны только две вещи: вселенная и человеческая глупость, при этом у меня нет полной уверенности лишь относительно первой из них (Альберт Эйнштейн). Синоним – human element (см. также human involvement, peopleware, social engineering, wetware).
113. hybrid security control – гибридный контроль безопасности; гибридное управление безопасностью # в ИБ – политика безопасности систем организации, сочетающая в себе черты общего управления безопасностью и специфичных для системы средств защиты (безопасности) (см. также common control, computer security, security control, system-specific security control).
114. ICSA – International Computer Security Association – Международная ассоциация по компьютерной безопасности # начала свою деятельность в 1992 году под названием NCSA. В тестированиях, проводимых ICSA Labs, используется вредоносный код как из собственной “коллекции”, так и из списка WildList. По результатам исследований продуктам выдаётся сертификат ICSA – его удостаиваются те антивирусы, которые способны обнаружить 100% вирусов из списка WildList, выпущенного за месяц до испытаний, и не менее 90% вирусов из собственной коллекции ICSA (см. также CheckMark, ITW, VB100%).
115. identity, credential, and access management (ICAM) – система идентификации, электронных удостоверений (ЭУ) и контроля доступа ICAM # в ИБ – государственная система США, призванная предотвращать несанкционированный доступ (НСД) к критически важным ресурсам, данным, компьютерным информационным системам (ИС) и другим подобным объектам (см. также access management, attribute-based access control, credential, identity, security).
116. identity theft (также electronic identity theft) – хищение личных (конфиденциальных) данных [о человеке], досл. “кража личности” # в информационной безопасности – вид компьютерного мошенничества, когда злоумышленник (или вредоносная программа) при осуществлении криминального действия выдаёт себя за другого человека. К этой категории относятся, например, хищение номеров кредитных карточек или захват аккаунтов пользователей. Например, identity theft protection – защита от кражи личных данных. Синоним – identity fraud (см. также account hijacking, after-theft diagnosis, computer crime, security).
117. impact – 1. воздействие, влияние, эффект # например, impact of cyberthreats on your business – влияние киберугроз на ваш бизнес;
2. (также impact level) – [негативные] последствия; потенциальный ущерб # в ИБ – величина потенциального ущерба (вреда) для организации в результате несанкционированного раскрытия, модификации или разрушения информации, либо потери информации или вывода из строя информационных систем (см. также high impact, impact analysis, impact value, low impact, moderate impact, potential impact, security);
3. оказывать воздействие.
118. impact value – величина потенциального ущерба # в ИБ – оценочная величина потенциального ущерба (вреда) для организации вследствие нарушения конфиденциальности, целостности или готовности информационной системы (ИС) и её информации; эта величина может быть низкой, средней или высокой – и она определяет соответствующую степень (категорию) безопасности ИС (low, moderate, high) (см. также availability, confidentiality, impact, integrity, security).
119. impersonation (также impersonating) – имперсонация; не реком. олицетворение # маскировка нарушителя (злоумышленника) или вредоносной программы под законного пользователя или легальную программу; например, by impersonating a legitimate diagnostic tool – подделываясь (маскируясь) под легальное средство диагностики. Разновидность спуфинга (spoofing) (см. также verifier impersonation attack, eavesdropping, masquerading, security).
120. inadvertent disclosure – непреднамеренное раскрытие информации # в ИБ – вид инцидента, когда информация случайно раскрывается лицу, не имеющему допуска на доступ к этой информации (см. также incident, security, unauthorized disclosure).
121. incident – 1. происшествие, событие, эпизод # см. также accident;
2. инцидент, неприятное происшествие, столкновение;
3. инцидент # в ИБ – ситуация в компьютерной системе, связанная с зафиксированным несанкционированным доступом или его попыткой, атакой или взломом. Нарушение или неминуемая угроза нарушения принятых политик безопасности или стандартных рекомендованных практик обеспечения безопасности компьютерных систем. Событие, которое реально или потенциально ставит под угрозу конфиденциальность, целостность или готовность таких систем либо данные, которые они обрабатывают, хранят или передают. Более строго, инцидент определяется как актуализация риска – событие или результат реализации угрозы, связанной с уязвимостью системы. Синоним – cyber incident (см. также event, incident handling, incident modeling, incident response plan, security incident, vulnerability);
4. непредвиденный (случайный) отказ техники; нештатная ситуация # см. также disaster recovery;
5. особая ситуация или ошибка, требующая проведения расследования # любое событие в работе программы или системы, требующее исследования и анализа. Синоним – deviation (см. также anomaly, incident diary).
122. incident diary – дневник (журнал) [учёта] инцидентов [ИБ] # предлагается пользователям системы для фиксации встретившихся им проблем, способов их разрешения (если удалось это сделать) и оценки сложности проблем, например по шкале Лайкерта (Likert scale). Ведение подобных журналов (в электронном виде) способствует повышению надёжности и удобства эксплуатации систем (см. также diary, incident).
123. incident handling – обработка инцидента (инцидентов) [ИБ] # в ИБ – методы и средства смягчения вредных последствий при нарушениях политик и рекомендованных практик обеспечения безопасности компьютерных систем. Например, incident handling team – группа обработки инцидентов (см. также incident, incident reporting, incident response plan, security incident).
124. incident management – контроль происшествий (инцидентов) [ИБ] # одна из подсистем в системах сетевого управления (см. также incident scope, incident response, network management).
125. incident outsourcing – инцидентный аутсорсинг # модификация аутсорсинга – привлечение внешних подрядчиков-соисполнителей для решения конкретных проблем по запросам заказчика; бывает более эффективным и экономически оправданным, чем обычный (постоянный) аутсорсинг (см. также incident, insourcing, outsourcing).
126. incident prevention – предупреждение инцидентов [ИБ] # см. также incident.
127. incident reporting – отчётность по инцидентам [ИБ] # в зависимости о уровня серьёзности инцидента, отчётность по нему может быть либо обязательной, либо необязательной (см. также incident, incident handling, mandatory reporting).
128. incident response – реакция на инцидент [ИБ] # например, incident response procedure – процедура реакции на инцидент; incident response policies – политики реакции на инциденты (см. также incident, incident diary, incident response plan).
129. incident response plan – план реагирования на инциденты [ИБ] # в ИБ – заранее определённый документированный набор инструкций или процедур, направленных на обнаружение и обработку инцидентов, ограничение и смягчение последствий вредоносных кибератак на компьютерные системы организации (см. также incident handling, security).
130. incident scope – масштаб инцидента [ИБ], “масштаб бедствия” # в ИБ – размеры повреждений и потерь в результате вредоносной атаки на компьютерные системы организации, количество (объём) украденных данных, величина и характеристики поверхности атаки (attack surface), а также стоимость устранения последствий данной атаки (to resolve the attack) и мер по предотвращению подобных успешных атак в будущем (см. также attack, incident, incident management, security).
131. incident solving (также incident resolving) – разрешение инцидента (инцидентов ИБ) # в ИБ – диагностика, выявление и устранение причин инцидента, предотвращение или уменьшение его неблагоприятных последствий, ущерба, вреда для системы, организации (см. также incident, incident handling, security).
132. inculpatory evidence – доказательство (доказательства) виновности, улики; вещественные доказательства # в ИБ – вещественные доказательства (вещдоки), позволяющие прогнозировать увеличение вероятности нарушения защиты программной системы или возникновение инцидента (инцидентов) (см. также exculpatory evidence, evidence, examination, incident, security).
133. intruder – взламыватель, злоумышленник, нарушитель, атакующий # неавторизованный, обычно злонамеренный (malicious intruder), пользователь (или программа), пытающийся получить несанкционированный доступ (НСД) в компьютерную систему. Потенциальные злоумышленники называются источниками угрозы (threat source) (см. также computer security, cracker, hacker threat, interloper, IP spoofing, malicious actor, security, snooper, target software, trespasser).
134. intruder detection – обнаружение нарушителей, выявление нарушителей # совокупность мер, способов, специализированного ПО и устройств для определения присутствия в сети или попыток входа в сеть неавторизованных пользователей – как физических лиц, так и программных средств (см. также attack detection, IDS, intruder, security).
135. intrusion – вторжение, [насильственное] проникновение, появление без приглашения; вмешательство # в ИБ – несанкционированное проникновение в систему в обход её защитных механизмов (см. также attack, computer security, IDS, information security, intrusion prevention, intrusion sensor, intrusion tool, session hijacking).
136. intrusion attempt – попытка проникновения [в систему/сеть] # см. также attack.
137. intrusion detection – обнаружение проникновения (вторжения) – см. intrusion.
138. intrusion prevention – предотвращение вторжений # технологии, позволяющие обнаруживать и устранять уязвимости (слабые места) системы до того, как они будут использованы для её взлома. Для этого прежде всего производится мониторинг трафика по таким протоколам, как HTTP, SNMP, TCP/IP. Например, network intrusion prevention system – система предотвращения сетевых вторжений (атак) (см. также attack detection, intruder detection, IPS, network security).
139. intrusion prevention system (IPS) – система предотвращения вторжений, СПВ # система блокирования несанкционированных действий, попыток атаки в момент их появления и нарушения информационной безопасности; система мониторинга сетевого трафика и обнаружения вторжений на основе поведения. Такие системы интегрируются с другими средствами защиты: с антивирусным ПО, межсетевыми экранами (firewall), сканерами безопасности (security scanner), системами управления инцидентами и т. п. Являются развитием систем IDS (см. также HIDS, network IPS device, network security, NIDS, security breach).
140. intrusion sensor – датчик охранной сигнализации # элемент системы безопасности жилых и производственных помещений. Синоним – intrusion detector (см. также intrusion detection).
141. intrusion testing – тестирование [системы] на вторжение (проникновение) # см. также ethical hacking, penetration testing.
142. intrusion tool – средство вторжения, инструмент для проникновения (атаки) # см. также intrusion.
143. IOC – indicator of compromise – признак компрометации, признак вторжения (проникновения) [в систему, сеть] # в ИБ – признаки (индикаторы, вещественные доказательства, улики и т. п.), которые можно найти после вредоносного вторжения в систему (сеть) и по которым специалисты могут что-то понять относительно вида атаки или наличия бреши (уязвимости) в средствах защиты и безопасности системы. Такими признаками могут быть IP-адреса, имена доменов, хэш-коды (хэш-значения) вредоносных файлов, сигнатуры вирусов и другие подобные артефакты (см. также compromise, investigator).
144. IT-related risk – риск, связанный с ИТ; ИТ-риск # в ИБ – вероятность того, что из-за конкретного источника угрозы и конкретной уязвимости одной или нескольких корпоративных систем будет нанесён серьёзный ущерб организации или бизнесу. В качестве примеров факторов риска можно назвать неавторизованное (злонамеренное, незлонамеренное или случайное) раскрытие, модификацию или разрушение информации; совершённые без злого умысла ошибки и упущения при создании и эксплуатации ИТ-систем; выход из строя ИТ-ресурсов в результате стихийных бедствий или антропогенных (техногенных) катастроф и др. (см. также security).
145. IT security architecture – архитектура [обеспечения] безопасности ИТ-систем # описание принципов обеспечения безопасности и общего подхода к реализации этих принципов при разработке систем; например, рекомендации по размещению и внедрению специальных сервисов безопасности в различные распределённые вычислительные среды (см. также security).
146. IT security awareness – информирование по проблемам ИТ-безопасности; осведомлённость в проблемах ИТ-безопасности – см. awareness.
147. IT security education – образование по ИТ-безопасности, образование в области ИБ # преподавание студентам профильных специальностей и специалистам математических и технических дисциплин, имеющих отношение к вопросам обеспечения безопасности (см. также information security education, IT security awareness, IT security training, security).
148. IT security investment – инвестиции в ИТ-безопасность # затраты на специалистов по ИТ/ИБ, обучение персонала, приобретение и внедрение ИТ-приложений или систем, предназначенных исключительно для обеспечения информационной безопасности и др.; например, закупка системы обнаружения вторжений (IDS) и инфраструктуры PKI (см. также cybersecurity spending, security).
149. IT security threat[s] – угроза (угрозы) безопасности ИТ-систем # в ИБ – требуют выявления, анализа и оценки для принятия адекватных мер защиты и предотвращения возможных неблагоприятных последствий (см. также attack, cyber threat, information security, security threat, vulnerability).
150. IT security training – обучение по ИТ-безопасности # рассчитано на сотрудников организации, не являющихся специалистами по ИТ-безопасности (на управленческий персонал, разработчиков систем, снабженцев, аудиторов и др.); цель – дать им необходимый минимум знаний и умений для выполнения конкретных функций (см. также IT security awareness, IT security education, IT security skills, security).
151. Kerberos ticket – билет Kerberos, мандат Kerberos # в ИБ – средство управления доступом, в частности для доменов безопасности Windows (см. также security, security domain).
152. key management – управление [криптографическими] ключами # общий термин, обозначающий все административные функции по генерации, распределению (распространению), сохранению, обновлению, уничтожению и адресации криптографических ключей и других данных, связанных с ИБ (например, паролей), на протяжении всего жизненного цикла ключей (см. также cryptographic key, FIREFLY, key, key management device, key management infrastructure, password).
153. KRB – см. Kerberos.
154. labeled security protection – защита по меткам безопасности # механизм контроля доступа к системе, в котором решение о предоставлении доступа к тем или иным ресурсам принимается с учётом их меток безопасности (см. также access control, security label).
155. laboratory attack – лабораторная атака # в ИБ – восстановление (чтение) информации носителя данных в лабораторных условиях при помощи сложного современного оборудования (см. также attack).
156. layered defense – эшелонированная оборона # в ИБ – многоуровневая архитектурная организация средств защиты компьютерной системы (сети), существенно повышающая их эффективность и реальное обеспечение безопасности. Синонимы – defense in depth, multilevel defense, multilevel security (см. также safety, security).
157. leakage – утечка [данных, информации] # несанкционированное и/или злоумышленное чтение, копирование, искажение или уничтожение конфиденциальной информации; например, копирование данных в незащищённое приложение с более низким уровнем безопасности, чем требуется с точки зрения секретности информации, на мобильные носители (компакт-диски, дискеты, USB-накопители), печать, открытие, редактирование чужих документов и т. д. Существует много способов и путей (каналов) утечки информации. Частичный синоним – spillage (см. также anti-leakage software, data breach, data leakage, leak, leakage channel, leakage path).
158. leakage channel – канал утечки [данных] # см. также leakage, leakage path.
159. least privilege (также least privilege principle, principle of least privilege, PoLP) – принцип минимума прав доступа (привилегий); принцип минимально необходимых прав доступа # в ИБ – способ ограничения доступа к информационным ресурсам для процессов, по аналогии с принципом need-to-know для пользователей; предоставление пользователям только тех прав доступа и только к тем ресурсам, которые необходимы им для выполнения служебных обязанностей. Принцип разработки такой архитектуры ИБ, которая предоставляла бы каждому объекту лишь минимально необходимые для выполнения его функций системные ресурсы и права доступа к ним (см. также clearance, mandatory access control, security).
160. logical perimeter – логический периметр # в ИБ – концептуальный периметр, охватывающий всех потенциальных пользователей системы, которые подключены к ней прямо или опосредованно и получают выходные данные системы без надёжного контроля со стороны соответствующей полномочной организации (см. также boundary, boundary protection, perimeter defense, physical perimeter, security perimeter).
161. loss of data (также data loss) – потеря данных # 1. возможные последствия сбоев-отказов системы, выхода из строя оборудования, ненадёжности устройств памяти, действий злоумышленного, вредоносного ПО и т. п.; 2. один из рисков ИБ – раскрытие корпоративной, проприетарной или секретной информации в результате хищения или утечки данных (см. также backup, cybersecurity risks, data destruction, data leakage, data loss, data loss prevention, data security, loss prevention, loss-sensitive traffic, security).
162. loss prevention – предотвращение потерь # в компьютерной безопасности – совокупность мер, предотвращающих вывод корпоративной сети из строя и потерю ценной информации.
163. low-impact system – система невысокой (малой, низкой) уязвимости # в ИБ – компьютерная система, для которой все три базовых целевых показателя безопасности (конфиденциальность, целостность или готовность) имеют низкую потенциальную возможность (низкий риск) нарушения (см. также low impact, security).
164. malicious – злонамеренный; злоумышленный; зловредный, вредоносный # например, malicious weapons – вредоносное оружие. Синонимы – spiteful, malign, hurtful (см. также malicious act, malicious activity, malicious applets, malicious attack, malicious circuit, malicious code, malicious email, malicious item, malicious website).
165. malicious act – злоумышленное (вредоносное) действие (деяние); деяние, совершённое со злым умыслом # см. также malicious activity, malicious code, malicious hacker.
166. malicious activity – вредоносная (злонамеренная) деятельность # см. также malicious act.
167. malicious actor – злоумышленник, нарушитель # синонимы и частичные синонимы – attacker, cracker, deliberate criminal, evil-doer, impostor, intruder, malefactor, malicious hacker, malicious user, manipulator, plotter, snooper, threat actor, trespasser, violator (см. также actor).
168. malicious applets – вредоносные аплеты # небольшие прикладные программы, которые автоматически скачиваются из Сети и запускаются, причём выполняя неавторизованные функции (операции) в приложениях (см. также applet, malware).
169. malicious attack – злонамеренная атака, вредоносная атака # см. также malicious software, malware attack.
170. malicious behavior – злоумышленное (вредоносное) поведение # один из признаков вредоносного ПО (см. также malicious activity, malware).
171. malicious circuit – вредоносная микросхема # микросхема, содержащая аппаратную закладку или недокументированную возможность, которые могут быть использованы для получения несанкционированного доступа к системе, для вывода системы из строя или перехвата данных. Пример: Hidden malicious circuits provide an attacker with a stealthy attack vector. – Схемы со скрытыми вредоносными “закладками” представляют собой тайный вектор атаки для злоумышленника (см. также attack vector, cybersecurity, maliciously modiﬁed device).
172. malicious code (malcode) – вредоносный код, вредоносная программа # например, malicious code attack – атака вредоносной программы. Синоним – malicious software (см. также file-based attack, malware).
173. malicious email – вредоносное электронное письмо, заражённое письмо # письмо с заражённым вложением, со ссылки на заражённый сайт, фишинговое письмо и т. д. (см. также malicious code, malicious website).
174. malicious hacker – злонамеренный хакер, зловредный хакер # синонимы – black hat hacker, criminal hacker, dark-side hacker, malicious code attacker (см. также hacker, malicious act, malicious user).
175. malicious item – вредоносный объект (элемент, файл, пакет, вирус, сообщение) # вредоносные или потенциально вредоносные (подозрительные) объекты должны обнаруживаться специальными антивирусными программами, изолироваться (помещаться в карантин) – чтобы они не могли причинить вред компьютеру, системе (см. также anti-virus software, item, malicious, quarantine).
176. malicious logic – вредоносная логика # аппаратные, аппаратно-программные или программные средства, которые скрытно и намеренно включены или введены в систему с вредоносными целями (см. также malicious circuit, malware).
177. maliciously modiﬁed device – злонамеренно модифицированное устройство # устройство, в котором установлены вредоносные микросхемы (см. также malicious circuit).
178. malicious software – вредоносное ПО – см. malware.
179. malicious tools – вредоносные утилиты, вредоносные инструментальные программы # программы, предназначенные для автоматизации создания вирусов, червей или троянских программ, DoS-атак на удалённые серверы, взлома других компьютеров и т. п. В отличие от вирусов, червей и троянских программ, вредоносные утилиты сами не представляют угрозы для компьютера, на котором исполняются, а вредоносные действия выполняются приложением только по прямому указанию злоумышленника (см. также DoS, malware).
180. malicious user – злонамеренный пользователь, вредоносный пользователь # см. также malicious actor, malicious hacker.
181. malicious website – вредоносный вебсайт # вебсайт, посещение которого может привести к заражению компьютера пользователя вредоносными программами. Посещение таких сайтов блокируется некоторыми антивирусами (см. также antivirus protection, compromised website, malware).
182. malvertising (также malicious advertising) – вредоносная реклама # использование онлайновой рекламы (online advertising) для распространения вредоносного ПО, с минимальным участием или без участия пользователей (см. также malware).
183. malware – от malicious software – вредоносные (злонамеренные) программы, разг. мэлвер # любая программа, скрытно введённая в компьютерную систему с намерением нарушить конфиденциальность, целостность или готовность её данных, приложений, ОС, т. е. действующая против интересов пользователя или владельца системы. К этой категории относятся все виды вирусов, черви, троянцы, шпионящее ПО, мэлвер для мобильных устройств (особенно для смартфонов) и т. п. Например, malware infection – заражение (инфицирование) вредоносным ПО. Синонимы – bad software, harmful program, malevolent program, malicious code (см. также anti-malware, antivirus software, attack, botnet malware, cryptocurrency malware, disinfection, exploit, ICS targeting malware, infected machine, MaaS, malicious applets, malicious behavior, malicious file, malicious logic, malicious tools, malvertising, malware analysis, malware attack, malware detection, malware inspection, malware protection, malware robots, malware scanning, malvertising, password-stealing malware, PUM, smart-phone malware, threat, virus, web robot, zero-day threat detection).
184. malware analysis – анализ вредоносного ПО # бывает статическим и динамическим (static and dynamic malware analysis) (см. также malware, malware inspection, malware research).
185. malware analyst – аналитик вредоносного ПО # должность в компаниях, занимающихся проблемами ИБ (см. также malware, malware analysis).
186. malware attack – атака [с использованием, с помощью] вредоносного ПО # один из серьёзных рисков кибербезопасности (КБ) – вредоносные действия инфицировавшего систему ПО, о котором владелец системы не знает (см. также attack, cybersecurity risks, data security, malicious attack, malware).
187. malware detection – обнаружение (выявление) вредоносного ПО # например, adversarial attacks against malware detection – состязательные атаки на средства обнаружения вредоносных программ (см. также malware, malware inspection).
188. malware-fighting engine (также malware engine) – движок борьбы с вредоносными программами (зловредами) # см. также malware, malware detection.
189. malicious file – файл с вредоносным ПО, заражённый файл # см. также malware.
190. malware forms of spyware – вредоносные виды шпионского (шпионящего) ПО # см. также anti-spyware, malware, non-malware forms of spyware, spyware.
191. malware inspection – проверка на наличие вредоносного ПО, проверка на мэлвер # многие поставщики брандмауэров (МЭ) заимствуют для этой цели традиционный метод антивирусной защиты настольных ПК: буферизуют загружаемые файлы, а потом проверяют их на наличие мэлвера. Такой подход не только вносит большие задержки, но и чреват рисками в отношении безопасности, поскольку объём имеющейся временной памяти может ограничивать максимальный размер файлов (см. также firewall, malware, network security, security risk).
192. malware protection – защита от вредоносного ПО (от мэлвера) # см. также malware attack, malware detection, malware research, malware scanning engine.
193. malware research – исследование вредоносного ПО (мэлвера) # исследование вредоносных программ для изучения используемых ими методов и создания средств противодействия им (см. также malware analysis, malware protection, research).
194. malware robots – вредоносные роботы # общее название программных веб-роботов, используемых злоумышленниками для неблаговидных, мошеннических, противоправных, преступных действий, афер, махинаций (см. также malware, web robot).
195. malware scanning – сканирование (поиск, обнаружение) вредоносного ПО # например, malware scanning technology – технология сканирования (поиска, обнаружения) вредоносного ПО (см. также malware scanning engine, scanning).
196. malware scanning engine – механизм сканирования (поиска, обнаружения) вредоносного ПО (мэлвера) # см. также malware inspection, malware protection, scanning.
197. malware stealing (также malware cryptocurrency stealing) – кража криптовалюты при помощи мэлвера # кража секретных ключей от криптокошельков с целью последующей кражи самой криптовалюты из этих кошельков (см. также cryptocurrency malware, malware).
198. man-in-the-browser attack (также man in the browser attack) – атака [злоумышленника] через браузер – см. man-in-the-middle attack.
199. man-in-the-middle attack (также man in the middle, MITM, man in the middle attack, MITM attack, MitM attack) – атака злоумышленника в роли посредника, атака типа MITM, MITM-атака # в криптографии и ИБ – разновидность активного перехвата сообщений (см. eavesdropping), когда атакующий устанавливает независимые соединения со своими жертвами-абонентами, которым кажется, что они общаются между собой по частной линии связи, в то время как фактически их разговор (обмен сообщениями) проходит под контролем атакующего; при этом атакующий каждому абоненту выдаёт себя за его собеседника (благодаря подложной взаимной аутентификации) и может даже вставлять в разговор свои сообщения. Большинство криптографических протоколов (cryptographic protocol) содержат средства предотвращения MITM-атак. В Интернете и в системах сотовой связи используются такие подкатегории подобных атак, как man-in-the-browser attack и man-in-the-mobile attack, для защиты от которых требуются новые средства. Синоним – bucket brigade attack (см. также ARP spoofing, attack, cybersecurity, masquerade, mutual authentication, replay attack, security).
200. man-in-the-mobile attack (также man in the mobile attack) – атака [злоумышленника] через мобильный телефон – см. man-in-the-middle attack.
201. manipulative communications deception (MCD) – манипуляционная дезинформация при коммуникациях # в ИБ – изменение передаваемых сообщений или симуляция дружественных телекоммуникаций с целью дезинформации, дезориентации противника. Один из способов радиоэлектронной борьбы, РЭБ (см. также communications cover, communications deception, imitative communications deception, manipulation, security).
202. moderate impact (MI, MIM, MIMP) – букв. умеренное воздействие, умеренный эффект; умеренная (средняя) уязвимость, умеренный риск, умеренный ущерб # в ИБ – потеря или нарушение конфиденциальности (confidentiality), целостности (integrity) или готовности (availability), в результате чего можно ожидать не слишком серьёзных последствий для работы организаций, для активов организаций, для физических лиц, для национальных интересов страны. Это может быть снижение функциональных возможностей и эффективности работы организации, заметное уменьшение активов, значительные финансовые убытки, телесные повреждения, но не смерть людей (см. также impact, moderate-impact system, security).
203. moderate-impact system – система умеренной уязвимости # в ИБ – компьютерная система, для которой как минимум один из базовых целевых показателей безопасности (конфиденциальность, целостность или готовность) имеет умеренную потенциальную возможность (умеренный риск) нарушения, но ни один из них не имеет высокого риска нарушения (см. также moderate impact, security).
204. National Vulnerability Database (NVD) – Национальная база данных уязвимостей, репозиторий стандартов NVD (США) # государственный репозиторий США, который хранит данные по управлению уязвимостями, собираемые при помощи протокола SCAP. Эти данные позволяют автоматизировать управление уязвимостями, измерение параметров безопасности, контроль соблюдения требований регуляторных органов, спецификаций и др. NVD содержит контрольные списки для оценки средств безопасности; сведения об известных ошибках ПО, влияющих на безопасность; варианты неправильных, рискованных конфигураций; списки применяемых продуктов; количественные показатели потенциального ущерба при разных атаках и др. (см. также impact, security, vulnerability).
205. need-to-know (также need-to-know principle) – тем, кому положено знать, для узкого круга лиц; для служебного пользования (ДСП) # в ИБ – принцип минимума необходимой информации; разговорный термин для обозначения сравнительно низкого уровня допуска к секретной работе и/или секретным материалам. Метод ограничения доступа к информационным ресурсам – пользователю предоставляется доступ только к той информации, которую ему необходимо знать для выполнения своей работы, но не более; это также принцип минимума прав доступа, привилегий (least privilege). При этом принцип need-to-know обычно действует для людей, а least privilege – для процессов (см. также clearance, mandatory access control, need-to-know determination, security).
206. need-to-know determination (также need to know determination) – определение минимума необходимой информации # в ИБ – авторизованный держатель секретной информации решает, какому пользователю он может предоставить доступ к ней для выполнения официальных обязанностей этого пользователя (см. также clearance, least privilege, need-to-know, security).
207. network-based attack – сетевая атака, атака сетевого уровня # в ИБ – атака, проводимая со стороны компьютерной сети и использующая особенности функционирования сетей, уязвимости в различных сетевых протоколах и службы. Для защиты от таких атак широко применяются межсетевые экраны, антивирусы и др. средства (см. также DDoS).
