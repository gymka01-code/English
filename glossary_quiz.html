<title>Cyber Glossary — Тренажёр терминов</title>

<style>
:root {
  --bg:      #060a0f;
  --surf:    #0c1219;
  --surf2:   #111b26;
  --border:  #1a2d3f;
  --acc:     #00d4ff;
  --acc2:    #00ff9d;
  --warn:    #ff6b35;
  --err:     #ff3d6b;
  --ok:      #00ff9d;
  --text:    #c8dde8;
  --muted:   #4a6a80;
  --mono:    'Share Tech Mono', monospace;
  --sans:    'Exo 2', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body {
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:20px 16px 48px;
  display:flex;
  justify-content:center;
  background-image:
    radial-gradient(ellipse 70% 50% at 10% 5%, rgba(0,212,255,.06) 0%,transparent 60%),
    radial-gradient(ellipse 50% 60% at 90% 90%, rgba(0,255,157,.04) 0%,transparent 60%);
}

.wrap{max-width:860px;width:100%}

/* ── HEADER ── */
header{text-align:center;margin-bottom:24px;position:relative}
.hdr-line{font-family:var(--mono);font-size:.7rem;color:var(--muted);letter-spacing:.15em;margin-bottom:6px}
h1{
  font-size:clamp(1.5rem,4vw,2.2rem);
  font-weight:800;
  letter-spacing:-.01em;
  color:#fff;
  text-shadow:0 0 30px rgba(0,212,255,.4);
}
h1 span{color:var(--acc)}
.sub{font-family:var(--mono);font-size:.78rem;color:var(--muted);margin-top:5px}

/* ── MODE TOGGLE ── */
.mode-bar{
  display:flex;justify-content:center;gap:0;
  margin-bottom:18px;border:1px solid var(--border);border-radius:10px;overflow:hidden;
  max-width:340px;margin-left:auto;margin-right:auto;
}
.mode-btn{
  flex:1;padding:9px 0;font-family:var(--mono);font-size:.78rem;
  background:var(--surf);border:none;color:var(--muted);cursor:pointer;
  transition:all .2s;letter-spacing:.05em;
}
.mode-btn:first-child{border-right:1px solid var(--border)}
.mode-btn.active{background:var(--acc);color:#000;font-weight:700}
.mode-btn:hover:not(.active){background:var(--surf2);color:var(--text)}

/* ── STATS ── */
.stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:8px;margin-bottom:16px;
}
.stat{
  background:var(--surf);border:1px solid var(--border);border-radius:10px;
  padding:9px 12px;text-align:center;
}
.stat-l{font-family:var(--mono);font-size:.62rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.stat-v{font-family:var(--mono);font-size:1.1rem;color:var(--acc);margin-top:2px;font-weight:700}

/* ── PROGRESS ── */
.prog-wrap{height:3px;background:var(--border);border-radius:99px;margin-bottom:16px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:99px;transition:width .4s ease}

/* ── FILTERS ── */
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;justify-content:center}
.f-btn{
  font-family:var(--mono);font-size:.68rem;padding:4px 11px;
  border-radius:20px;border:1px solid var(--border);
  background:var(--surf);color:var(--muted);cursor:pointer;transition:all .18s;
  letter-spacing:.04em;
}
.f-btn:hover,.f-btn.on{border-color:var(--acc);background:rgba(0,212,255,.07);color:var(--acc)}

/* ── CARD ── */
.card{
  background:var(--surf);border:1px solid var(--border);border-radius:18px;
  padding:clamp(18px,4vw,32px);
  box-shadow:0 0 60px rgba(0,0,0,.6),0 0 0 1px rgba(0,212,255,.04);
  min-height:420px;display:flex;flex-direction:column;position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--acc),var(--acc2),transparent);
  opacity:.5;
}

/* scan-line aesthetic */
.card::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
  border-radius:18px;
}

.q-cat{
  display:inline-block;font-family:var(--mono);font-size:.65rem;
  padding:3px 10px;border-radius:20px;border:1px solid rgba(0,212,255,.25);
  background:rgba(0,212,255,.06);color:var(--acc);margin-bottom:14px;
  letter-spacing:.08em;text-transform:uppercase;
}

.direction-badge{
  font-family:var(--mono);font-size:.7rem;color:var(--muted);
  margin-bottom:10px;letter-spacing:.06em;
}

.term-box{
  background:var(--surf2);border:1px solid var(--border);border-radius:12px;
  padding:18px 22px;margin-bottom:22px;text-align:center;position:relative;
}
.term-lang{font-family:var(--mono);font-size:.62rem;color:var(--muted);margin-bottom:6px;letter-spacing:.1em}
.term-text{
  font-family:var(--mono);font-size:clamp(1rem,2.8vw,1.4rem);
  color:#fff;line-height:1.4;text-shadow:0 0 20px rgba(0,212,255,.3);
}

/* ── OPTIONS ── */
.opts{display:grid;gap:9px}
.opt{
  background:var(--surf2);border:1px solid var(--border);border-radius:10px;
  padding:13px 16px;cursor:pointer;transition:all .15s;
  font-family:var(--mono);font-size:.88rem;color:var(--text);
  text-align:left;display:flex;gap:12px;align-items:flex-start;
  line-height:1.4;
}
.opt-l{
  min-width:18px;font-size:.7rem;color:var(--muted);
  padding-top:1px;font-weight:700;transition:color .15s;
}
.opt:hover:not([data-lock]){border-color:var(--acc);background:rgba(0,212,255,.06)}
.opt:hover:not([data-lock]) .opt-l{color:var(--acc)}
.opt.ok{background:rgba(0,255,157,.08);border-color:var(--ok);color:#e0fff4}
.opt.ok .opt-l{color:var(--ok)}
.opt.bad{background:rgba(255,61,107,.08);border-color:var(--err);color:#ffe0e8}
.opt.bad .opt-l{color:var(--err)}

/* ── FEEDBACK ── */
.fb{
  margin-top:14px;padding:12px 15px;
  background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);
  border-radius:10px;font-family:var(--mono);font-size:.8rem;color:#7ec8e3;
  line-height:1.5;display:none;
}
.fb.show{display:block}
.fb-ok{border-color:rgba(0,255,157,.2);background:rgba(0,255,157,.05);color:#7effd4}
.fb-bad{border-color:rgba(255,61,107,.2);background:rgba(255,61,107,.05);color:#ff9db5}

/* ── CONTROLS ── */
.ctrl{display:flex;justify-content:space-between;align-items:center;padding-top:20px;margin-top:auto;gap:10px}
.btn{
  font-family:var(--sans);font-weight:700;font-size:.88rem;
  padding:10px 20px;border-radius:9px;border:none;cursor:pointer;transition:all .18s;
}
.btn-p{background:var(--surf2);border:1px solid var(--border);color:var(--muted)}
.btn-p:hover{color:var(--text);border-color:var(--acc)}
.btn-n{background:var(--acc);color:#000}
.btn-n:disabled{opacity:.3;cursor:not-allowed}
.btn-n:not(:disabled):hover{background:var(--acc2);box-shadow:0 0 20px rgba(0,212,255,.3)}
.btn-sh{
  font-family:var(--mono);font-size:.7rem;padding:7px 13px;
  border-radius:8px;border:1px solid var(--border);background:none;
  color:var(--muted);cursor:pointer;transition:all .18s;
}
.btn-sh:hover{border-color:var(--acc2);color:var(--acc2)}

/* ── RESULT ── */
.res{text-align:center;padding:32px 16px}
.res-score{font-family:var(--mono);font-size:3.5rem;color:var(--acc);text-shadow:0 0 40px rgba(0,212,255,.5)}
.res-of{font-family:var(--mono);font-size:.85rem;color:var(--muted);margin:4px 0 20px}
.res-msg{font-size:1rem;margin-bottom:24px;color:var(--text)}
.btn-res{background:var(--acc);color:#000;padding:12px 30px;font-size:.95rem}
.mod-scores{margin-top:26px;text-align:left}
.mod-hdr{font-family:var(--mono);font-size:.65rem;color:var(--muted);letter-spacing:.12em;margin-bottom:12px;text-transform:uppercase}
.mod-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:12px;font-family:var(--mono);font-size:.72rem}
.mod-name{min-width:120px;color:var(--muted)}
.mod-bar{flex:1;height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.mod-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:99px}
.mod-val{min-width:70px;text-align:right;color:var(--acc2)}

.hidden{display:none!important}
</style>
</head>

// ─── STATE ──────────────────────────────────────────────────────────────────
let mode = 'en';       // 'en'→show EN pick RU  |  'ru'→show RU pick EN
let activeCat = -1;    // -1 = all
let pool = [];         // question objects
let idx = 0;
let score = 0;
let done = false;
let modStats = {};     // {catIdx: {right,total}}

const LETTERS = ['A','B','C','D'];

// ─── WRONG ANSWER GENERATION ────────────────────────────────────────────────
function getWrongs(term, count = 3) {
  const catIdx = term[2];
  const correctKey = mode === 'en' ? term[1] : term[0];

  // prefer same category for harder questions
  let sameCat = T.filter(t => t[2] === catIdx && (mode==='en' ? t[1] : t[0]) !== correctKey);
  let other   = T.filter(t => t[2] !== catIdx && (mode==='en' ? t[1] : t[0]) !== correctKey);

  // shuffle both
  sameCat = sameCat.sort(() => Math.random() - .5);
  other   = other.sort(() => Math.random() - .5);

  // take from same cat first, fill with others
  const combined = [...sameCat, ...other];

  // deduplicate by answer text (avoid duplicate translations)
  const seen = new Set([correctKey]);
  const wrongs = [];
  for (const t of combined) {
    const ans = mode === 'en' ? t[1] : t[0];
    if (!seen.has(ans)) { seen.add(ans); wrongs.push(ans); }
    if (wrongs.length === count) break;
  }
  return wrongs;
}

// ─── BUILD POOL ──────────────────────────────────────────────────────────────
function buildPool() {
  const src = activeCat === -1 ? T : T.filter(t => t[2] === activeCat);
  pool = src.map(term => {
    const correct = mode === 'en' ? term[1] : term[0];
    const wrongs  = getWrongs(term, 3);
    const opts    = [correct, ...wrongs].sort(() => Math.random() - .5);
    const ci      = opts.indexOf(correct);
    return { term, opts, ci };
  }).sort(() => Math.random() - .5);

  // reset modStats
  modStats = {};
  CATS.forEach((_, i) => modStats[i] = {right:0, total:0});
  pool.forEach(q => modStats[q.term[2]].total++);
}

// ─── FILTERS UI ──────────────────────────────────────────────────────────────
function buildFilters() {
  const el = document.getElementById('filters');
  const counts = CATS.map((_, i) => T.filter(t => t[2] === i).length);
  el.innerHTML = '';

  const allBtn = makeBtn(`Все (${T.length})`, -1);
  el.appendChild(allBtn);
  CATS.forEach((name, i) => el.appendChild(makeBtn(`${name} (${counts[i]})`, i)));
}

function makeBtn(label, catVal) {
  const b = document.createElement('button');
  b.className = 'f-btn' + (activeCat === catVal ? ' on' : '');
  b.textContent = label;
  b.onclick = () => {
    activeCat = catVal;
    document.querySelectorAll('.f-btn').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    init();
  };
  return b;
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  idx = 0; score = 0; done = false;
  buildPool();
  document.getElementById('s-tot').textContent = pool.length;
  document.getElementById('s-sc').textContent  = '0';
  document.getElementById('s-pct').textContent = '—';
  document.getElementById('res-card').classList.add('hidden');
  document.getElementById('card').classList.remove('hidden');
  render();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  if (idx >= pool.length) { showResult(); return; }

  const {term, opts, ci} = pool[idx];
  const showTerm  = mode === 'en' ? term[0] : term[1];
  const showLang  = mode === 'en' ? 'EN' : 'RU';
  const pickLang  = mode === 'en' ? 'RU' : 'EN';
  const catName   = CATS[term[2]];

  document.getElementById('nxt').disabled = true;
  document.getElementById('s-cur').textContent  = idx + 1;
  document.getElementById('s-cat').textContent  = catName;
  document.getElementById('prog').style.width   = Math.round((idx / pool.length) * 100) + '%';

  const fb = document.getElementById('fb');
  fb.textContent = ''; fb.className = 'fb';

  document.getElementById('qa').innerHTML = `
    <div class="q-cat">${catName}</div>
    <div class="direction-badge">${showLang} → ${pickLang} &nbsp;·&nbsp; выберите правильный перевод</div>
    <div class="term-box">
      <div class="term-lang">${showLang}</div>
      <div class="term-text">${esc(showTerm)}</div>
    </div>
    <div class="opts">
      ${opts.map((o, i) => `
        <button class="opt" onclick="pick(this,${i},${ci},'${esc2(mode==='en'?term[0]:term[1])}','${esc2(mode==='en'?term[1]:term[0])}')" data-i="${i}">
          <span class="opt-l">${LETTERS[i]}</span>
          <span>${esc(o)}</span>
        </button>
      `).join('')}
    </div>
  `;
}

function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function esc2(s) { return String(s).replace(/'/g,"\\'"); }

// ─── ANSWER ──────────────────────────────────────────────────────────────────
function pick(el, sel, ci, enTerm, ruTerm) {
  if (done) return;
  done = true;

  document.querySelectorAll('.opt').forEach(o => o.setAttribute('data-lock','1'));

  const fb = document.getElementById('fb');

  if (sel === ci) {
    el.classList.add('ok');
    score++;
    modStats[pool[idx].term[2]].right++;
    document.getElementById('s-sc').textContent = score;
    fb.textContent = `✓ Верно! ${enTerm} = ${ruTerm}`;
    fb.className = 'fb show fb-ok';
  } else {
    el.classList.add('bad');
    document.querySelector(`.opt[data-i="${ci}"]`).classList.add('ok');
    fb.textContent = `✗ Неверно. ${enTerm} → ${ruTerm}`;
    fb.className = 'fb show fb-bad';
  }

  const answered = idx + 1;
  document.getElementById('s-pct').textContent = Math.round((score / answered) * 100) + '%';
  document.getElementById('nxt').disabled = false;
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function nextQ() { if (!done && idx < pool.length) return; idx++; done=false; render(); }
function prevQ() { if (idx > 0) { idx--; done=false; render(); } }

function reshuf() {
  pool = pool.sort(() => Math.random() - .5);
  idx = 0; score = 0; done = false;
  Object.values(modStats).forEach(v => { v.right = 0; });
  document.getElementById('s-sc').textContent  = '0';
  document.getElementById('s-pct').textContent = '—';
  render();
}

// ─── MODE ─────────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('m-en').classList.toggle('active', m==='en');
  document.getElementById('m-ru').classList.toggle('active', m==='ru');
  init();
}

// ─── RESULT ──────────────────────────────────────────────────────────────────
function showResult() {
  document.getElementById('card').classList.add('hidden');
  const rc = document.getElementById('res-card');
  rc.classList.remove('hidden');

  const total = pool.length;
  const pct   = Math.round((score / total) * 100);

  document.getElementById('r-sc').textContent  = `${score}/${total}`;
  document.getElementById('r-of').textContent  = `${pct}% правильных ответов`;

  const msgs = [
    [90, '🏆 Отлично! Вы знаете эту терминологию как профессионал.'],
    [75, '💪 Хорошо! Ещё немного практики — и будет идеально.'],
    [55, '📖 Неплохо. Повторите слабые категории.'],
    [0,  '🔄 Нужно ещё позаниматься. Запустите тест снова!'],
  ];
  document.getElementById('r-msg').textContent = msgs.find(([t]) => pct >= t)[1];

  const activeMods = CATS.map((name, i) => ({name, i, ...modStats[i]}))
    .filter(m => m.total > 0)
    .sort((a, b) => b.total - a.total);

  document.getElementById('r-mods').innerHTML = `
    <div class="mod-hdr">// результаты по категориям</div>
    ${activeMods.map(({name, right, total}) => {
      const p = Math.round((right/total)*100);
      return `<div class="mod-row">
        <span class="mod-name">${name}</span>
        <div class="mod-bar"><div class="mod-fill" style="width:${p}%"></div></div>
        <span class="mod-val">${right}/${total} (${p}%)</span>
      </div>`;
    }).join('')}
  `;
}

function restart() {
  document.getElementById('res-card').classList.add('hidden');
  init();
}

// ─── START ───────────────────────────────────────────────────────────────────
buildFilters();
init();
</script>
