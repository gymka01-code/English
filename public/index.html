<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кибер-Словарь: Тренажер</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14; --surface: #161921; --surface2: #1e2230; --border: #2a2f40;
            --accent: #5c6fff; --accent2: #a78bfa; --success: #22c55e; --warning: #f59e0b;
            --error: #f43f5e; --text: #e2e8f0; --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; display: flex; justify-content: center; }
        .wrap { max-width: 860px; width: 100%; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; background: linear-gradient(135deg, #818cf8, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Range Config */
        .config-panel { background: var(--surface2); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; justify-content: center; border: 1px solid var(--border); flex-wrap: wrap;}
        .config-panel input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 6px; width: 80px; text-align: center; font-family: 'JetBrains Mono';}
        .btn-apply { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold;}
        
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; flex: 1; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: bold; margin-top: 5px; color: var(--accent2); }
        .progress-wrap { height: 4px; background: var(--border); border-radius: 99px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); transition: width 0.3s; }
        
        .filters { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .filter-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-weight: bold; }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(92,111,255,.1); }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; text-align: center; min-height: 350px; display: flex; flex-direction: column; justify-content: center;}
        .term-num { color: var(--muted); font-family: 'JetBrains Mono'; font-size: 0.8rem; margin-bottom: 10px;}
        .term-eng { font-size: 2.2rem; font-weight: 800; font-family: 'JetBrains Mono'; margin-bottom: 15px; }
        .term-ru { font-size: 1.4rem; color: var(--success); font-weight: 600; display: none; margin-bottom: 10px;}
        .term-desc { color: #a5b4fc; font-size: 0.9rem; background: rgba(92,111,255,.1); padding: 10px; border-radius: 10px; display: none; }
        
        .btn-show { margin: 20px auto 0; padding: 12px 30px; font-size: 1.1rem; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; }
        .fc-controls { display: none; gap: 10px; margin-top: 20px; }
        .fc-controls button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white;}
        .rate-bad { background: var(--error); } .rate-hard { background: var(--warning); } .rate-good { background: var(--success); }

        .quiz-opts { display: none; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .quiz-opt { background: var(--surface2); border: 2px solid var(--border); color: #fff; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 1rem;}
        .quiz-opt.correct { border-color: var(--success); background: rgba(34,197,94,.1); }
        .quiz-opt.wrong { border-color: var(--error); background: rgba(244,63,94,.1); }
        .reset-btn { display: block; margin: 30px auto 0; background: none; color: var(--error); border: 1px solid var(--error); padding: 5px 15px; border-radius: 5px; cursor: pointer;}
    </style>
</head>
<body>
<div class="wrap">
    <header><h1>Кибер-Словарь ИБ</h1></header>

    <div class="config-panel">
        <span>Изучать слова с </span>
        <input type="number" id="inp-start" value="1" min="1">
        <span> по </span>
        <input type="number" id="inp-end" value="50" min="1">
        <span style="color: var(--muted); font-size: 0.8rem;" id="total-words-info"></span>
        <button class="btn-apply" onclick="applyRange()">Применить</button>
    </div>

    <div class="stats">
        <div class="stat"><div style="font-size:0.7rem;color:var(--muted)">В ТЕКУЩЕМ ДИАПАЗОНЕ</div><div class="stat-value" id="s-total">0</div></div>
        <div class="stat"><div style="font-size:0.7rem;color:var(--muted)">ОСТАЛОСЬ УЧИТЬ</div><div class="stat-value" id="s-learning" style="color:var(--warning)">0</div></div>
        <div class="stat"><div style="font-size:0.7rem;color:var(--muted)">ВЫУЧЕНО (3/3)</div><div class="stat-value" id="s-mastered" style="color:var(--success)">0</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>

    <div class="filters">
        <button class="filter-btn active" id="mode-flashcards" onclick="setMode('flashcards')">Карточки</button>
        <button class="filter-btn" id="mode-quiz" onclick="setMode('quiz')">Тест (выбор ответа)</button>
    </div>

    <div class="card">
        <div class="term-num" id="term-num">Слово #1</div>
        <div class="term-eng" id="term-eng">Loading...</div>
        <div class="term-ru" id="term-ru"></div>
        <div class="term-desc" id="term-desc"></div>

        <button class="btn-show" id="btn-show" onclick="revealCard()">Показать перевод</button>
        <div class="fc-controls" id="fc-controls">
            <button class="rate-bad" onclick="rateWord(0)">Не помню (0)</button>
            <button class="rate-hard" onclick="rateWord(1)">Сложно (+1)</button>
            <button class="rate-good" onclick="rateWord(2)">Легко (+2)</button>
        </div>
        <div class="quiz-opts" id="quiz-opts"></div>
    </div>
    <button class="reset-btn" onclick="resetProgress()">Сбросить прогресс в БД</button>
</div>

document.getElementById('total-words-info').textContent = `(Всего слов: ${FULL_DICT.length})`;

let progress = {}; 
const MAX_SCORE = 3;
let currentMode = 'flashcards';
let currentWord = null;
let activeDict = [];

// API Calls
async function fetchProgress() {
    try {
        const res = await fetch('/api/progress');
        progress = await res.json();
    } catch(e) {
        console.error("Сервер недоступен, работаем локально", e);
    }
}

async function saveProgressApi(termEn, score) {
    try {
        await fetch('/api/progress', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ termEn, score })
        });
    } catch(e) { console.error("Ошибка сохранения", e); }
}

async function init() {
    await fetchProgress();
    applyRange(); // Применяет диапазон и запускает первое слово
}

function applyRange() {
    let start = parseInt(document.getElementById('inp-start').value) || 1;
    let end = parseInt(document.getElementById('inp-end').value) || 50;
    
    if(start < 1) start = 1;
    if(end > FULL_DICT.length) end = FULL_DICT.length;
    if(start > end) start = end;

    // Массивы идут с 0, поэтому отнимаем 1
    activeDict = FULL_DICT.slice(start - 1, end);
    
    // Добавляем слова в прогресс, если их там нет
    activeDict.forEach(w => { if(progress[w.en] === undefined) progress[w.en] = { score: 0 }; });
    
    updateStats();
    nextWord();
}

function updateStats() {
    let mastered = 0;
    activeDict.forEach(w => { if (progress[w.en] && progress[w.en].score >= MAX_SCORE) mastered++; });
    const total = activeDict.length;
    
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-learning').textContent = total - mastered;
    document.getElementById('s-mastered').textContent = mastered;
    document.getElementById('progress').style.width = (total===0 ? 0 : Math.round((mastered/total)*100)) + '%';
}

function setMode(mode) {
    currentMode = mode;
    document.getElementById('mode-flashcards').classList.toggle('active', mode === 'flashcards');
    document.getElementById('mode-quiz').classList.toggle('active', mode === 'quiz');
    nextWord();
}

function pickSmartWord() {
    let unlearned = activeDict.filter(w => progress[w.en].score < MAX_SCORE);
    if (unlearned.length === 0) {
        alert("В этом диапазоне вы выучили всё! Увеличьте диапазон.");
        return activeDict[Math.floor(Math.random() * activeDict.length)];
    }
    unlearned.sort((a, b) => progress[a.en].score - progress[b.en].score);
    const poolSize = Math.min(5, unlearned.length);
    return unlearned[Math.floor(Math.random() * poolSize)];
}

function nextWord() {
    if(activeDict.length === 0) return;
    currentWord = pickSmartWord();
    
    // Найти номер текущего слова в полном словаре
    const realIndex = FULL_DICT.findIndex(w => w.en === currentWord.en) + 1;
    document.getElementById('term-num').textContent = `Слово #${realIndex}`;

    document.getElementById('term-eng').textContent = currentWord.en;
    document.getElementById('term-ru').textContent = currentWord.ru;
    document.getElementById('term-desc').textContent = "💡 " + currentWord.desc;
    
    document.getElementById('term-ru').style.display = 'none';
    document.getElementById('term-desc').style.display = 'none';
    
    if (currentMode === 'flashcards') {
        document.getElementById('btn-show').style.display = 'block';
        document.getElementById('fc-controls').style.display = 'none';
        document.getElementById('quiz-opts').style.display = 'none';
    } else {
        document.getElementById('btn-show').style.display = 'none';
        document.getElementById('fc-controls').style.display = 'none';
        setupQuiz();
    }
}

function revealCard() {
    document.getElementById('btn-show').style.display = 'none';
    document.getElementById('term-ru').style.display = 'block';
    document.getElementById('term-desc').style.display = 'block';
    document.getElementById('fc-controls').style.display = 'flex';
}

async function rateWord(points) {
    let s = progress[currentWord.en].score;
    let newScore = points === 0 ? Math.max(0, s - 1) : Math.min(MAX_SCORE, s + points);
    
    progress[currentWord.en].score = newScore;
    updateStats();
    await saveProgressApi(currentWord.en, newScore);
    nextWord();
}

function setupQuiz() {
    const opts = document.getElementById('quiz-opts');
    opts.innerHTML = '';
    opts.style.display = 'grid';

    let wrongOpts = FULL_DICT.filter(w => w.en !== currentWord.en).sort(() => 0.5 - Math.random()).slice(0, 3);
    let allOpts = [currentWord, ...wrongOpts].sort(() => 0.5 - Math.random());

    allOpts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'quiz-opt';
        btn.textContent = opt.ru;
        btn.onclick = () => handleQuizAnswer(btn, opt.en === currentWord.en);
        opts.appendChild(btn);
    });
}

async function handleQuizAnswer(btn, isCorrect) {
    if (btn.hasAttribute('locked')) return;
    document.querySelectorAll('.quiz-opt').forEach(b => b.setAttribute('locked', '1'));

    let s = progress[currentWord.en].score;
    if (isCorrect) {
        btn.classList.add('correct');
        progress[currentWord.en].score = Math.min(MAX_SCORE, s + 1);
    } else {
        btn.classList.add('wrong');
        progress[currentWord.en].score = Math.max(0, s - 1);
        document.querySelectorAll('.quiz-opt').forEach(b => {
            if (b.textContent === currentWord.ru) b.classList.add('correct');
        });
    }
    
    document.getElementById('term-desc').style.display = 'block';
    updateStats();
    await saveProgressApi(currentWord.en, progress[currentWord.en].score);

    setTimeout(nextWord, 2000);
}

async function resetProgress() {
    if(confirm("Удалить весь прогресс из базы данных?")) {
        await fetch('/api/reset', { method: 'POST' });
        for(let key in progress) progress[key].score = 0;
        updateStats();
        nextWord();
    }
}

init();
</script>
